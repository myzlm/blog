<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵·云笺 | 古风科技博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 18, 30, 0.85);
            --gold: #c9a96e;
            --gold-bright: #e0c78a;
            --gold-glow: rgba(201, 169, 110, 0.5);
            --vermillion: #c53b3b;
            --cyan-neon: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.45);
            --text-primary: #e8e0d5;
            --text-secondary: #b8b0a0;
            --text-muted: #7a7265;
            --border-subtle: rgba(180, 150, 100, 0.25);
            --border-glow: rgba(201, 169, 110, 0.5);
            --font-calligraphy: 'ZCOOL QingKe HuangYou', 'Ma Shan Zheng', 'STXingkai', '华文行楷', 'KaiTi', '楷体', serif;
            --font-body: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STSong', '宋体', 'KaiTi', serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --radius-lg: 24px;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            line-height: 1.7;
            letter-spacing: 0.02em;
        }
        /* 动态水墨背景 */
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(80, 60, 40, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 180, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(160, 100, 60, 0.06) 0%, transparent 55%);
            background-size: 200% 200%;
            animation: inkFlow 25s ease-in-out infinite alternate;
        }
        @keyframes inkFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 50% 70%; }
            100% { background-position: 100% 30%; }
        }
        /* 粒子增强画布 */
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        /* 全息扫描线 */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 6px);
            opacity: 0.7;
        }
        .main-container {
            position: relative; z-index: 2;
            width: 100%; max-width: 1000px; margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .header {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.6rem; padding: 1rem 0 1.5rem;
            border-bottom: 1px solid var(--border-subtle); position: relative;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--cyan-neon), var(--gold), transparent);
            box-shadow: 0 0 20px var(--gold-glow), 0 0 10px var(--cyan-glow);
            animation: headerGlow 3s ease-in-out infinite alternate;
        }
        @keyframes headerGlow { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .plaque {
            position: relative; display: inline-block;
            padding: 0.6rem 2.5rem;
            background: linear-gradient(180deg, rgba(30,22,14,0.95) 0%, rgba(20,14,8,0.95) 100%);
            border: 2px solid #5a3e22; border-radius: 6px;
            box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.5), 0 0 0 6px #2a1405, 0 10px 30px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow);
            text-align: center;
            animation: plaqueFloat 4s ease-in-out infinite;
        }
        @keyframes plaqueFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(0.3deg); }
            75% { transform: translateY(2px) rotate(-0.2deg); }
        }
        .plaque-title {
            font-family: var(--font-calligraphy); font-size: clamp(2rem, 4vw, 3rem);
            color: #e8d5a3; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(200,160,60,0.7), 0 0 30px rgba(180,130,40,0.5);
            animation: textShine 4s ease-in-out infinite alternate;
        }
        @keyframes textShine {
            0% { text-shadow: 0 0 10px rgba(200,160,60,0.6), 0 0 25px rgba(180,130,40,0.4); }
            100% { text-shadow: 0 0 20px rgba(220,180,80,0.9), 0 0 40px rgba(200,150,50,0.6); }
        }
        .user-area .btn {
            backdrop-filter: blur(12px); border: 1px solid rgba(180,150,100,0.5);
            transition: 0.4s ease;
        }
        .user-area .btn:hover { box-shadow: 0 0 25px var(--gold-glow), 0 0 15px var(--cyan-glow); }
        .articles-grid { display: grid; grid-template-columns: 1fr; gap: 1.3rem; }
        @media (min-width: 768px) { .articles-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); } }
        .article-card {
            background: rgba(18, 18, 30, 0.75); backdrop-filter: blur(18px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
            padding: 1.4rem 1.5rem; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; overflow: hidden;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }
        .article-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.7s ease;
        }
        .article-card:hover::before { left: 100%; }
        .article-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px var(--gold-glow), 0 0 15px var(--cyan-glow);
            border-color: var(--gold);
        }
        .article-card.pinned { border-color: var(--vermillion); }
        .article-card.pinned::after {
            content: '📌 置顶'; position: absolute; top: 12px; right: 15px;
            font-size: 0.7rem; color: var(--vermillion); letter-spacing: 1px;
            text-shadow: 0 0 8px var(--vermillion);
        }
        .article-card .card-title { color: var(--gold-bright); text-shadow: 0 0 8px rgba(200,160,60,0.4); }
        .article-card .card-seal {
            background: var(--vermillion); box-shadow: 0 0 15px rgba(197,59,59,0.7);
            animation: sealGlow 2s ease-in-out infinite alternate;
        }
        @keyframes sealGlow { 0% { box-shadow: 0 0 8px rgba(197,59,59,0.5); } 100% { box-shadow: 0 0 20px rgba(220,80,80,0.9); } }
        .btn { /* 通用按钮样式保持 */ }
        .search-box:focus { border-color: var(--cyan-neon); box-shadow: 0 0 15px var(--cyan-glow); }
        #backToTop {
            background: rgba(20,18,28,0.8); backdrop-filter: blur(12px);
            border: 1px solid var(--gold); box-shadow: 0 0 20px var(--gold-glow);
        }
        .modal { border: 1px solid var(--gold); box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 25px var(--gold-glow); }
        .toast { backdrop-filter: blur(12px); }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="particleCanvas"></canvas>
    <div id="toastContainer"></div>
    <div id="backToTop" title="返回顶部">⬆</div>

    <div class="main-container">
        <header class="header">
            <div class="plaque"><h1 class="plaque-title">墨韵·云笺</h1></div>
            <p class="subtitle">✦ 古风为骨 · 科技为翼 ✦</p>
            <div class="user-area" id="userArea">
                <span class="greeting" id="greetingText">未登录·过客</span>
                <button class="btn" id="loginBtn">🔑 登 录</button>
                <button class="btn admin-btn hidden" id="adminPanelBtn">⚙️ 管理</button>
                <button class="btn hidden" id="logoutBtn">🚪 登 出</button>
            </div>
        </header>

        <div class="view active" id="viewList">
            <div class="toolbar">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索文章标题、摘要或标签...">
                <div class="tag-filter" id="tagFilter"></div>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem;">
                <button class="btn primary-btn hidden" id="newArticleBtn">📝 撰写新篇</button>
            </div>
            <div class="articles-grid" id="articlesGrid"></div>
            <div class="empty-state hidden" id="emptyState"><span class="empty-icon">📜</span> 尚无文章，静待墨香</div>
        </div>

        <div class="view" id="viewDetail">
            <button class="btn" id="backToListBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="article-detail" id="articleDetailContent"></div>
        </div>

        <div class="view" id="viewAdmin">
            <button class="btn" id="backFromAdminBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="admin-panel" id="adminPanelContent">
                <div class="admin-header"><h3>🔰 文章管理</h3><button class="btn primary-btn" id="adminNewArticleBtn">📝 撰写新篇</button></div>
                <div id="adminArticlesList"></div>
            </div>
        </div>
    </div>

    <!-- 模态框（登录、文章编辑、删除确认）略，内容与上一版相同，保留完整结构 -->
    <div class="modal-overlay" id="loginModal"><div class="modal"><button class="close-btn" id="closeLoginModal">&times;</button><h2>🔑 登录云笺</h2><form onsubmit="return false"><div class="input-group"><label>账号</label><input type="text" id="loginUsername" autocomplete="username"></div><div class="input-group"><label>密码</label><input type="password" id="loginPassword" autocomplete="current-password"></div><div class="modal-actions"><button class="btn primary-btn" id="submitLogin">登 录</button></div></form><p class="hint">游客可浏览，登录后方可管理文章</p></div></div>
    <div class="modal-overlay" id="articleModal"><div class="modal" style="max-width:640px;"><button class="close-btn" id="closeArticleModal">&times;</button><h2 id="articleModalTitle">📝 撰写文章</h2><form onsubmit="return false"><div class="input-group"><label>标题</label><input type="text" id="articleTitle"></div><div class="input-group"><label>摘要</label><input type="text" id="articleSummary"></div><div class="input-group"><label>标签（逗号分隔）</label><input type="text" id="articleTags"></div><div class="input-group"><label>印章</label><input type="text" id="articleSeal" maxlength="2"></div><div class="input-group"><label>置顶</label><input type="checkbox" id="articlePinned" style="width:auto;"> 置顶</div><div class="input-group"><label>内容</label><textarea id="articleContent"></textarea></div><input type="hidden" id="articleEditId"><div class="modal-actions"><button class="btn primary-btn" id="submitArticle">发 布</button><button class="btn" id="cancelArticle">取 消</button></div></form></div></div>
    <div class="modal-overlay" id="confirmModal"><div class="modal" style="max-width:400px;text-align:center;"><h2 style="color:#e8b0b0;">⚠️ 确认删除</h2><p style="color:var(--text-secondary);">此操作不可恢复</p><div class="modal-actions"><button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button><button class="btn" id="cancelDeleteBtn">取 消</button></div><input type="hidden" id="confirmDeleteId"></div></div>

    <script>
        (function() {
            var API_BASE = 'https://myzlm.serveousercontent.com';
            var $ = function(s) { return document.querySelector(s); };
            var $$ = function(s) { return document.querySelectorAll(s); };

            function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }
            function showToast(msg, type) { /* 同上版 */ }
            function formatDate(d) { /* 同上版 */ }
            function calcReadTime(t) { var w = (t||'').replace(/[^\u4e00-\u9fa5a-zA-Z]/g,'').length; return Math.max(1, Math.round(w/400)); }

            var currentUser = null, articles = [], currentView = 'list', pendingDeleteId = null, activeTag = null;

            async function apiCall(url, opt, silent) { /* 同上版 */ }
            async function checkLogin() { /* 同上版 */ }
            function updateUI() { /* 同上版 */ }
            async function login(u,p) { /* 同上版 */ }
            async function logout() { /* 同上版 */ }
            function switchView(v) { /* 同上版 */ }
            async function loadArticles() { /* 同上版，含置顶排序 */ }
            function getFiltered() { /* 同上版 */ }
            function renderList() { /* 同上版，卡片含阅读时间 */ }
            function renderTags() { /* 同上版 */ }
            async function viewArticle(id) { /* 同上版 */ }
            function renderDetail(a) { /* 同上版 */ }
            async function openEditor(id) { /* 同上版，含置顶复选框 */ }
            async function submitArticle() { /* 同上版 */ }
            function confirmDel(id,title) { /* 同上版 */ }
            async function execDel() { /* 同上版 */ }
            async function renderAdmin() { /* 同上版 */ }

            // 粒子特效升级：水墨粒子 + 光点
            function initParticles() {
                var canvas = $('#particleCanvas');
                var ctx = canvas.getContext('2d');
                var w, h, particles = [];
                function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
                window.addEventListener('resize', resize); resize();
                function Particle() { this.reset(true); }
                Particle.prototype.reset = function(init) {
                    this.x = Math.random() * w;
                    this.y = init ? Math.random() * h : -10;
                    this.size = 0.5 + Math.random() * 2.5;
                    this.speedY = 0.2 + Math.random() * 0.8;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.opacity = 0.3 + Math.random() * 0.6;
                    this.type = Math.random() > 0.7 ? 'gold' : (Math.random() > 0.5 ? 'cyan' : 'ink');
                    if (this.type === 'gold') this.color = 'rgba(200,160,60,'+this.opacity+')';
                    else if (this.type === 'cyan') this.color = 'rgba(0,220,240,'+this.opacity+')';
                    else this.color = 'rgba(120,100,80,'+this.opacity+')';
                };
                Particle.prototype.update = function() {
                    this.y += this.speedY; this.x += Math.sin(this.y*0.01) * this.speedX;
                    if (this.y > h + 15) this.reset(false);
                };
                Particle.prototype.draw = function(ctx) {
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fill();
                };
                for (var i=0; i<60; i++) particles.push(new Particle());
                function animate() {
                    ctx.clearRect(0,0,w,h);
                    for (var i=0; i<particles.length; i++) { particles[i].update(); particles[i].draw(ctx); }
                    requestAnimationFrame(animate);
                }
                animate();
            }

            function bindEvents() {
                $('#loginBtn').addEventListener('click', function(){ $('#loginModal').classList.add('active'); });
                $('#closeLoginModal').addEventListener('click', function(){ $('#loginModal').classList.remove('active'); });
                $('#submitLogin').addEventListener('click', async function(){
                    var u=$('#loginUsername').value.trim(), p=$('#loginPassword').value;
                    if(!u||!p) return showToast('请输入账号密码','error');
                    try{ await login(u,p); $('#loginModal').classList.remove('active'); $('#loginUsername').value=''; $('#loginPassword').value=''; loadArticles(); renderList(); renderTags(); }
                    catch(e){ showToast('登录失败: '+e.message,'error'); }
                });
                $('#logoutBtn').addEventListener('click', logout);
                $('#adminPanelBtn').addEventListener('click', function(){ switchView('admin'); });
                $('#backFromAdminBtn').addEventListener('click', function(){ switchView('list'); });
                $('#newArticleBtn').addEventListener('click', function(){ openEditor(null); });
                $('#adminNewArticleBtn').addEventListener('click', function(){ openEditor(null); });
                $('#closeArticleModal').addEventListener('click', function(){ $('#articleModal').classList.remove('active'); });
                $('#cancelArticle').addEventListener('click', function(){ $('#articleModal').classList.remove('active'); });
                $('#submitArticle').addEventListener('click', submitArticle);
                $('#backToListBtn').addEventListener('click', function(){ switchView('list'); });
                $('#confirmDeleteBtn').addEventListener('click', execDel);
                $('#cancelDeleteBtn').addEventListener('click', function(){ $('#confirmModal').classList.remove('active'); });
                $('#searchInput').addEventListener('input', function(){ renderList(); });
                var topBtn = $('#backToTop');
                window.addEventListener('scroll', function(){ topBtn.style.display = window.scrollY>500?'flex':'none'; });
                topBtn.addEventListener('click', function(){ window.scrollTo({top:0,behavior:'smooth'}); });
                var overlays = $$('.modal-overlay');
                for (var i=0; i<overlays.length; i++) {
                    (function(ov){ ov.addEventListener('click', function(e){ if(e.target===ov) ov.classList.remove('active'); }); })(overlays[i]);
                }
            }

            window._blogApp = { viewArticle, editArticle: openEditor, confirmDeleteArticle: confirmDel };
            async function init() {
                initParticles(); bindEvents();
                await loadArticles(); await checkLogin();
                renderList(); renderTags();
            }
            init();
        })();
    </script>
</body>
</html>
