    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 18, 30, 0.85);
            --gold: #c9a96e;
            --gold-bright: #e0c78a;
            --gold-glow: rgba(201, 169, 110, 0.5);
            --vermillion: #c53b3b;
            --cyan-neon: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.45);
            --text-primary: #e8e0d5;
            --text-secondary: #b8b0a0;
            --text-muted: #7a7265;
            --border-subtle: rgba(180, 150, 100, 0.25);
            --border-glow: rgba(201, 169, 110, 0.5);
            --font-calligraphy: 'ZCOOL QingKe HuangYou', 'Ma Shan Zheng', 'STXingkai', '华文行楷', 'KaiTi', '楷体', serif;
            --font-body: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STSong', '宋体', 'KaiTi', serif;
            --radius-lg: 24px;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            line-height: 1.7;
            letter-spacing: 0.02em;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(80, 60, 40, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 180, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(160, 100, 60, 0.06) 0%, transparent 55%);
            background-size: 200% 200%;
            animation: inkFlow 25s ease-in-out infinite alternate;
        }
        @keyframes inkFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 50% 70%; }
            100% { background-position: 100% 30%; }
        }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 6px);
            opacity: 0.7;
        }
        .main-container {
            position: relative; z-index: 2;
            width: 100%; max-width: 1000px; margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .header {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.6rem; padding: 1rem 0 1.5rem;
            border-bottom: 1px solid var(--border-subtle); position: relative;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--cyan-neon), var(--gold), transparent);
            box-shadow: 0 0 20px var(--gold-glow), 0 0 10px var(--cyan-glow);
            animation: headerGlow 3s ease-in-out infinite alternate;
        }
        @keyframes headerGlow { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .plaque {
            position: relative; display: inline-block;
            padding: 0.6rem 2.5rem;
            background: linear-gradient(180deg, rgba(30,22,14,0.95) 0%, rgba(20,14,8,0.95) 100%);
            border: 2px solid #5a3e22; border-radius: 6px;
            box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.5), 0 0 0 6px #2a1405, 0 10px 30px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow);
            text-align: center;
            animation: plaqueFloat 4s ease-in-out infinite;
        }
        @keyframes plaqueFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-3px) rotate(0.3deg); }
            75% { transform: translateY(2px) rotate(-0.2deg); }
        }
        .plaque-title {
            font-family: var(--font-calligraphy); font-size: clamp(2rem, 4vw, 3rem);
            color: #e8d5a3; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(200,160,60,0.7), 0 0 30px rgba(180,130,40,0.5);
            animation: textShine 4s ease-in-out infinite alternate;
        }
        @keyframes textShine {
            0% { text-shadow: 0 0 10px rgba(200,160,60,0.6), 0 0 25px rgba(180,130,40,0.4); }
            100% { text-shadow: 0 0 20px rgba(220,180,80,0.9), 0 0 40px rgba(200,150,50,0.6); }
        }
        .subtitle { font-family: var(--font-body); font-size: 0.9rem; color: var(--text-muted); letter-spacing: 2px; text-shadow: 0 0 8px var(--cyan-glow); margin-top: 0.2rem; }
        .user-area { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; justify-content: center; margin-top: 0.3rem; }
        .greeting { font-size: 0.9rem; color: var(--text-secondary); background: rgba(255,250,240,0.05); padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid rgba(180,150,100,0.3); letter-spacing: 1px; }
        .btn {
            font-family: var(--font-body); background: rgba(20,18,28,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(180,150,100,0.4); color: var(--text-primary);
            padding: 0.45rem 1.1rem; border-radius: 24px; font-size: 0.9rem;
            cursor: pointer; transition: all var(--transition-smooth); letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; overflow: hidden;
        }
        .btn:hover { background: rgba(40,32,20,0.8); border-color: var(--gold); color: #fff; box-shadow: var(--shadow-glow-gold), 0 4px 16px rgba(0,0,0,0.4); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn.admin-btn { border-color: rgba(197,59,59,0.5); color: #e8b0b0; background: rgba(30,15,15,0.7); }
        .btn.admin-btn:hover { border-color: var(--vermillion); box-shadow: 0 0 20px var(--vermillion-glow), 0 4px 16px rgba(0,0,0,0.4); }
        .btn.primary-btn { background: rgba(180,130,50,0.2); border-color: var(--gold); color: var(--gold-bright); font-weight: bold; }
        .btn.primary-btn:hover { background: rgba(200,150,60,0.3); box-shadow: var(--shadow-glow-gold), 0 0 25px var(--gold-glow); }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; letter-spacing: 0.5px; border-radius: 18px; }

        .toolbar { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
        .search-box {
            flex: 1; min-width: 200px; padding: 0.5rem 1rem;
            background: rgba(20,18,28,0.6); backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle); border-radius: 24px;
            color: var(--text-primary); font-family: var(--font-body); font-size: 0.9rem;
            outline: none; transition: var(--transition-smooth);
        }
        .search-box:focus { border-color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); }
        .tag-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .tag-chip {
            background: rgba(180,150,100,0.1); border: 1px solid rgba(180,150,100,0.3);
            padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem;
            color: var(--gold); cursor: pointer; transition: var(--transition-smooth);
        }
        .tag-chip.active, .tag-chip:hover { background: rgba(200,150,60,0.3); border-color: var(--gold); }

        .articles-grid { display: grid; grid-template-columns: 1fr; gap: 1.3rem; }
        @media (min-width: 768px) { .articles-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); } }
        .article-card {
            background: rgba(18, 18, 30, 0.75); backdrop-filter: blur(18px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
            padding: 1.4rem 1.5rem; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; overflow: hidden;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
        }
        .article-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.7s ease;
        }
        .article-card:hover::before { left: 100%; }
        .article-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px var(--gold-glow), 0 0 15px var(--cyan-glow); border-color: var(--gold); }
        .article-card.pinned { border-color: var(--vermillion); }
        .article-card.pinned::after {
            content: '📌 置顶'; position: absolute; top: 12px; right: 15px;
            font-size: 0.7rem; color: var(--vermillion); letter-spacing: 1px;
            text-shadow: 0 0 8px var(--vermillion);
        }
        .article-card .card-title {
            font-family: var(--font-calligraphy); font-size: 1.3rem;
            color: var(--gold-bright); letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(200,160,60,0.3); line-height: 1.4;
        }
        .article-card .card-seal {
            width: 44px; height: 44px; background: var(--vermillion); color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-family: 'Ma Shan Zheng', var(--font-calligraphy); font-size: 1.4rem;
            box-shadow: 0 0 15px rgba(197,59,59,0.7); animation: sealGlow 2s ease-in-out infinite alternate;
        }
        @keyframes sealGlow { 0% { box-shadow: 0 0 8px rgba(197,59,59,0.5); } 100% { box-shadow: 0 0 20px rgba(220,80,80,0.9); } }

        #backToTop {
            position: fixed; bottom: 30px; right: 30px; z-index: 50;
            width: 45px; height: 45px; border-radius: 50%;
            background: rgba(20,18,28,0.8); backdrop-filter: blur(12px);
            border: 1px solid var(--gold); color: var(--gold-bright);
            font-size: 1.5rem; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .hidden { display: none !important; }
        .view { display: none; }
        .view.active { display: block; }
        .modal { border: 1px solid var(--gold); box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 25px var(--gold-glow); }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="particleCanvas"></canvas>
    <div id="toastContainer"></div>
    <div id="backToTop" title="返回顶部">⬆</div>

    <div class="main-container">
        <header class="header">
            <div class="plaque"><h1 class="plaque-title">墨韵·云笺</h1></div>
            <p class="subtitle">✦ 古风为骨 · 科技为翼 ✦</p>
            <div class="user-area" id="userArea">
                <span class="greeting" id="greetingText">未登录·过客</span>
                <button class="btn" id="loginBtn">🔑 登 录</button>
                <button class="btn admin-btn hidden" id="adminPanelBtn">⚙️ 管理</button>
                <button class="btn hidden" id="logoutBtn">🚪 登 出</button>
            </div>
        </header>

        <div class="view active" id="viewList">
            <div class="toolbar">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索文章标题、摘要或标签...">
                <div class="tag-filter" id="tagFilter"></div>
            </div>
            <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem;">
                <button class="btn primary-btn hidden" id="newArticleBtn">📝 撰写新篇</button>
            </div>
            <div class="articles-grid" id="articlesGrid"></div>
            <div class="empty-state hidden" id="emptyState"><span class="empty-icon">📜</span> 尚无文章，静待墨香</div>
        </div>

        <div class="view" id="viewDetail">
            <button class="btn" id="backToListBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="article-detail" id="articleDetailContent"></div>
        </div>

        <div class="view" id="viewAdmin">
            <button class="btn" id="backFromAdminBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="admin-panel" id="adminPanelContent">
                <div class="admin-header"><h3>🔰 文章管理</h3><button class="btn primary-btn" id="adminNewArticleBtn">📝 撰写新篇</button></div>
                <div id="adminArticlesList"></div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="loginModal"><div class="modal"><button class="close-btn" id="closeLoginModal">&times;</button><h2>🔑 登录云笺</h2><form onsubmit="return false"><div class="input-group"><label>账号</label><input type="text" id="loginUsername" autocomplete="username"></div><div class="input-group"><label>密码</label><input type="password" id="loginPassword" autocomplete="current-password"></div><div class="modal-actions"><button class="btn primary-btn" id="submitLogin">登 录</button></div></form></div></div>
    <div class="modal-overlay" id="articleModal"><div class="modal" style="max-width:640px;"><button class="close-btn" id="closeArticleModal">&times;</button><h2 id="articleModalTitle">📝 撰写文章</h2><form onsubmit="return false"><div class="input-group"><label>标题</label><input type="text" id="articleTitle"></div><div class="input-group"><label>摘要</label><input type="text" id="articleSummary"></div><div class="input-group"><label>标签（逗号分隔）</label><input type="text" id="articleTags"></div><div class="input-group"><label>印章</label><input type="text" id="articleSeal" maxlength="2"></div><div class="input-group"><label>置顶</label><input type="checkbox" id="articlePinned" style="width:auto;"> 置顶</div><div class="input-group"><label>内容</label><textarea id="articleContent"></textarea></div><input type="hidden" id="articleEditId"><div class="modal-actions"><button class="btn primary-btn" id="submitArticle">发 布</button><button class="btn" id="cancelArticle">取 消</button></div></form></div></div>
    <div class="modal-overlay" id="confirmModal"><div class="modal" style="max-width:400px;text-align:center;"><h2 style="color:#e8b0b0;">⚠️ 确认删除</h2><p style="color:var(--text-secondary);">此操作不可恢复</p><div class="modal-actions"><button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button><button class="btn" id="cancelDeleteBtn">取 消</button></div><input type="hidden" id="confirmDeleteId"></div></div>

    <script>
        (function() {
            var API_BASE = 'https://myzlm.serveousercontent.com';
            var $ = function(s) { return document.querySelector(s); };
            var $$ = function(s) { return document.querySelectorAll(s); };

            function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }
            function showToast(msg, type) { var t=type||'success'; var c=$('#toastContainer'); var d=document.createElement('div'); d.className='toast toast-'+t; d.textContent=msg; c.appendChild(d); setTimeout(function(){ if(d.parentNode)d.remove(); },3000); }
            function formatDate(d) { if(!d) return ''; var dt=new Date(d); var ch=['','元月','杏月','桃月','槐月','榴月','荷月','兰月','桂月','菊月','露月','葭月','腊月']; var m=dt.getMonth()+1; var g=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸']; var z=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥']; return g[(dt.getFullYear()-4)%10]+z[(dt.getFullYear()-4)%12]+'年·'+(ch[m]||m+'月')+dt.getDate()+'日'; }
            function calcReadTime(t) { var w=(t||'').replace(/[^\u4e00-\u9fa5a-zA-Z]/g,'').length; return Math.max(1, Math.round(w/400)); }

            var currentUser = null, articles = [], currentView = 'list', pendingDeleteId = null, activeTag = null;

            async function apiCall(url, opt, silent) {
                opt=opt||{}; silent=silent||false;
                var config = { credentials:'include', headers:{'Content-Type':'application/json'} };
                if(opt.method) config.method=opt.method;
                if(opt.body&&typeof opt.body==='object') config.body=JSON.stringify(opt.body);
                try {
                    var res = await fetch(API_BASE+url, config);
                    if(!res.ok) { if(silent)return null; var d=await res.json().catch(function(){return{};}); throw new Error(d.error||'请求失败 ('+res.status+')'); }
                    var txt = await res.text();
                    return txt ? JSON.parse(txt) : null;
                } catch(e) { if(silent) return null; throw e; }
            }

            async function checkLogin() {
                var data = await apiCall('/api/me',{},true);
                currentUser = (data&&data.username) ? data : null;
                updateUI();
            }
            function updateUI() {
                var g=$('#greetingText'), l=$('#loginBtn'), o=$('#logoutBtn'), a=$('#adminPanelBtn'), n=$('#newArticleBtn');
                if(currentUser) {
                    g.textContent=(currentUser.role==='admin'?'🔰':'📖')+' '+currentUser.username;
                    l.classList.add('hidden'); o.classList.remove('hidden');
                    if(currentUser.role==='admin') { a.classList.remove('hidden'); n.classList.remove('hidden'); }
                    else { a.classList.add('hidden'); n.classList.add('hidden'); }
                } else {
                    g.textContent='未登录·过客'; l.classList.remove('hidden'); o.classList.add('hidden');
                    a.classList.add('hidden'); n.classList.add('hidden');
                }
                if(currentView==='list') { renderList(); renderTags(); }
                if(currentView==='admin') renderAdmin();
            }
            async function login(u,p) {
                var data = await apiCall('/api/login',{method:'POST',body:{username:u,password:p}});
                currentUser={username:data.username,role:data.role};
                updateUI(); showToast('欢迎回来，'+data.username);
            }
            async function logout() { await apiCall('/api/logout',{method:'POST'},true); currentUser=null; updateUI(); showToast('已登出'); switchView('list'); }
            function switchView(v) {
                currentView=v;
                var views=$$('.view'); for(var i=0;i<views.length;i++) views[i].classList.remove('active');
                var t=$('#view'+v.charAt(0).toUpperCase()+v.slice(1)); if(t) t.classList.add('active');
                if(v==='list') { renderList(); renderTags(); }
                if(v==='admin') renderAdmin();
                window.scrollTo({top:0});
            }
            async function loadArticles() {
                try { var d=await apiCall('/api/articles'); articles=Array.isArray(d)?d:[]; }
                catch(e) { articles=[]; }
                articles.sort(function(a,b){ return (b.pinned?1:0)-(a.pinned?1:0)||new Date(b.createdAt)-new Date(a.createdAt); });
            }
            function getFiltered() {
                var s=$('#searchInput')?$('#searchInput').value.trim().toLowerCase():'';
                return articles.filter(function(a){
                    var ms=true; if(s) { var t=(a.title||'').toLowerCase(), sm=(a.summary||'').toLowerCase(), tg=(a.tags||[]).join(' ').toLowerCase(); ms=t.indexOf(s)!==-1||sm.indexOf(s)!==-1||tg.indexOf(s)!==-1; }
                    var mt=!activeTag||(a.tags&&a.tags.indexOf(activeTag)!==-1);
                    return ms&&mt;
                });
            }
            function renderList() {
                var g=$('#articlesGrid'), e=$('#emptyState');
                var filtered=getFiltered();
                if(!filtered.length) { g.innerHTML=''; e.classList.remove('hidden'); return; }
                e.classList.add('hidden');
                var h='';
                for(var i=0;i<filtered.length;i++) {
                    var a=filtered[i];
                    h+='<div class="article-card'+(a.pinned?' pinned':'')+'" data-id="'+escapeHtml(a.id)+'">';
                    h+='<div class="card-header"><span class="card-title">'+escapeHtml(a.title||'无题')+'</span><span class="card-seal">'+escapeHtml(a.seal||'墨')+'</span></div>';
                    h+='<p class="card-summary">'+escapeHtml(a.summary||(a.content?a.content.substring(0,120):'暂无摘要'))+'</p>';
                    h+='<div class="card-meta"><span class="card-date">'+formatDate(a.createdAt)+'</span><span class="reading-time">'+calcReadTime(a.content||'')+' 分钟</span>';
                    var tags=a.tags||[]; for(var j=0;j<tags.length;j++) h+='<span class="card-tag">'+escapeHtml(tags[j])+'</span>';
                    h+='</div></div>';
                }
                g.innerHTML=h;
                g.onclick=function(ev){ var card=ev.target.closest('.article-card'); if(card) viewArticle(card.dataset.id); };
            }
            function renderTags() {
                var c=$('#tagFilter');
                var all={}; for(var i=0;i<articles.length;i++) { var ts=articles[i].tags||[]; for(var j=0;j<ts.length;j++) all[ts[j]]=true; }
                var arr=Object.keys(all);
                c.innerHTML='<span class="tag-chip'+(activeTag?'':' active')+'" data-tag="">全部</span>';
                for(var k=0;k<arr.length;k++) c.innerHTML+='<span class="tag-chip'+(activeTag===arr[k]?' active':'')+'" data-tag="'+escapeHtml(arr[k])+'">'+escapeHtml(arr[k])+'</span>';
                c.onclick=function(ev){ if(ev.target.classList.contains('tag-chip')) { activeTag=ev.target.dataset.tag||null; renderList(); renderTags(); } };
            }
            async function viewArticle(id) {
                try { var a=await apiCall('/api/articles/'+encodeURIComponent(id)); if(!a){showToast('文章不存在','error');return;} renderDetail(a); switchView('detail'); }
                catch(e){showToast('加载失败:'+e.message,'error');}
            }
            function renderDetail(a) {
                var c=$('#articleDetailContent');
                var html=''; try { html=marked.parse(a.content); } catch(e){ html=escapeHtml(a.content).replace(/\n/g,'<br>'); }
                c.innerHTML='<div class="detail-header"><h1 class="detail-title">'+escapeHtml(a.title)+'</h1><div class="detail-meta"><span>📅 '+formatDate(a.createdAt)+'</span>'+(a.updatedAt&&a.updatedAt!==a.createdAt?'<span>✏️ 更新于 '+formatDate(a.updatedAt)+'</span>':'')+((a.tags||[]).map(function(t){return'<span class="detail-tag">'+escapeHtml(t)+'</span>';}).join(''))+'<span style="margin-left:auto;color:var(--vermillion);font-family:var(--font-calligraphy);">【'+escapeHtml(a.seal||'墨')+'】</span></div></div><div class="detail-content">'+html+'</div><div class="detail-actions"></div>';
                if(currentUser&&currentUser.role==='admin') {
                    var actions=c.querySelector('.detail-actions');
                    var eb=document.createElement('button'); eb.className='btn btn-sm'; eb.textContent='✏️ 编辑'; eb.onclick=function(){openEditor(a.id);};
                    var db=document.createElement('button'); db.className='btn btn-sm btn-danger'; db.textContent='🗑️ 删除'; db.onclick=function(){confirmDel(a.id,a.title);};
                    actions.appendChild(eb); actions.appendChild(db);
                }
            }
            async function openEditor(id) {
                var m=$('#articleModal'), t=$('#articleModalTitle'), s=$('#submitArticle');
                if(id) {
                    var a=await apiCall('/api/articles/'+encodeURIComponent(id));
                    if(!a){showToast('文章不存在','error');return;}
                    t.textContent='✏️ 编辑文章'; s.textContent='保 存';
                    $('#articleTitle').value=a.title||''; $('#articleSummary').value=a.summary||'';
                    $('#articleTags').value=(a.tags||[]).join(', '); $('#articleSeal').value=a.seal||'墨';
                    $('#articleContent').value=a.content||''; $('#articlePinned').checked=!!a.pinned;
                    $('#articleEditId').value=id;
                } else {
                    t.textContent='📝 撰写新篇'; s.textContent='发 布';
                    $('#articleTitle').value=''; $('#articleSummary').value=''; $('#articleTags').value='';
                    $('#articleSeal').value='墨'; $('#articleContent').value=''; $('#articlePinned').checked=false;
                    $('#articleEditId').value='';
                }
                m.classList.add('active');
            }
            async function submitArticle() {
                var title=$('#articleTitle').value.trim(), content=$('#articleContent').value.trim();
                if(!title||!content){showToast('标题和内容不能为空','error');return;}
                var data={title:title,content:content,summary:$('#articleSummary').value.trim(),tags:$('#articleTags').value.split(',').map(function(t){return t.trim();}).filter(Boolean),seal:$('#articleSeal').value.trim()||'墨',pinned:$('#articlePinned').checked};
                var editId=$('#articleEditId').value;
                try {
                    if(editId){ await apiCall('/api/articles/'+encodeURIComponent(editId),{method:'PUT',body:data}); showToast('文章已更新'); }
                    else { await apiCall('/api/articles',{method:'POST',body:data}); showToast('文章已发布'); }
                    $('#articleModal').classList.remove('active');
                    await loadArticles();
                    if(currentView==='list') { renderList(); renderTags(); }
                    if(currentView==='admin') renderAdmin();
                } catch(e){ showToast('操作失败:'+e.message,'error'); }
            }
            function confirmDel(id,title) { pendingDeleteId=id; $('#confirmModal').classList.add('active'); $('#confirmModal').querySelector('p').textContent='此操作不可恢复，确定要删除「'+(title||'这篇文章')+'」吗？'; }
            async function execDel() {
                if(!pendingDeleteId) return;
                try { await apiCall('/api/articles/'+encodeURIComponent(pendingDeleteId),{method:'DELETE'}); showToast('已删除'); }
                catch(e){ showToast('删除失败:'+e.message,'error'); }
                $('#confirmModal').classList.remove('active'); pendingDeleteId=null;
                await loadArticles();
                if(currentView==='list') { renderList(); renderTags(); }
                if(currentView==='admin') renderAdmin();
                if(currentView==='detail') switchView('list');
            }
            async function renderAdmin() {
                var c=$('#adminArticlesList');
                if(!articles.length){ c.innerHTML='<p style="color:var(--text-muted);text-align:center;padding:2rem;">暂无文章</p>'; return; }
                var h='';
                for(var i=0;i<articles.length;i++) {
                    var a=articles[i];
                    h+='<div class="article-manage-item"><div class="item-info"><span class="item-title">'+escapeHtml(a.title)+'</span><span class="item-date">'+formatDate(a.createdAt)+'</span></div><div class="item-actions"><button class="btn btn-sm edit-btn" data-id="'+escapeHtml(a.id)+'">✏️</button><button class="btn btn-sm btn-danger delete-btn" data-id="'+escapeHtml(a.id)+'" data-title="'+escapeHtml(a.title||'')+'">🗑️</button></div></div>';
                }
                c.innerHTML=h;
                c.onclick=function(ev){ if(ev.target.classList.contains('edit-btn')) openEditor(ev.target.dataset.id); else if(ev.target.classList.contains('delete-btn')) confirmDel(ev.target.dataset.id, ev.target.dataset.title); };
            }

            function initParticles() {
                var canvas=$('#particleCanvas'), ctx=canvas.getContext('2d'), w,h, particles=[];
                function resize(){ w=window.innerWidth; h=window.innerHeight; canvas.width=w; canvas.height=h; }
                window.addEventListener('resize',resize); resize();
                function Particle(){ this.reset(true); }
                Particle.prototype.reset=function(init){ this.x=Math.random()*w; this.y=init?Math.random()*h:-10; this.size=0.5+Math.random()*2.5; this.speedY=0.2+Math.random()*0.8; this.speedX=(Math.random()-0.5)*0.4; this.opacity=0.3+Math.random()*0.6; this.type=Math.random()>0.7?'gold':(Math.random()>0.5?'cyan':'ink'); if(this.type==='gold')this.color='rgba(200,160,60,'+this.opacity+')'; else if(this.type==='cyan')this.color='rgba(0,220,240,'+this.opacity+')'; else this.color='rgba(120,100,80,'+this.opacity+')'; };
                Particle.prototype.update=function(){ this.y+=this.speedY; this.x+=Math.sin(this.y*0.01)*this.speedX; if(this.y>h+15)this.reset(false); };
                Particle.prototype.draw=function(ctx){ ctx.globalAlpha=this.opacity; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); };
                for(var i=0;i<60;i++) particles.push(new Particle());
                function animate(){ ctx.clearRect(0,0,w,h); for(var i=0;i<particles.length;i++){ particles[i].update(); particles[i].draw(ctx); } requestAnimationFrame(animate); }
                animate();
            }

            function bindEvents() {
                $('#loginBtn').addEventListener('click',function(){$('#loginModal').classList.add('active');});
                $('#closeLoginModal').addEventListener('click',function(){$('#loginModal').classList.remove('active');});
                $('#submitLogin').addEventListener('click',async function(){
                    var u=$('#loginUsername').value.trim(), p=$('#loginPassword').value;
                    if(!u||!p) return showToast('请输入账号密码','error');
                    try{ await login(u,p); $('#loginModal').classList.remove('active'); $('#loginUsername').value=''; $('#loginPassword').value=''; await loadArticles(); renderList(); renderTags(); }
                    catch(e){ showToast('登录失败:'+e.message,'error'); }
                });
                $('#logoutBtn').addEventListener('click',logout);
                $('#adminPanelBtn').addEventListener('click',function(){ switchView('admin'); });
                $('#backFromAdminBtn').addEventListener('click',function(){ switchView('list'); });
                $('#newArticleBtn').addEventListener('click',function(){ openEditor(null); });
                $('#adminNewArticleBtn').addEventListener('click',function(){ openEditor(null); });
                $('#closeArticleModal').addEventListener('click',function(){ $('#articleModal').classList.remove('active'); });
                $('#cancelArticle').addEventListener('click',function(){ $('#articleModal').classList.remove('active'); });
                $('#submitArticle').addEventListener('click',submitArticle);
                $('#backToListBtn').addEventListener('click',function(){ switchView('list'); });
                $('#confirmDeleteBtn').addEventListener('click',execDel);
                $('#cancelDeleteBtn').addEventListener('click',function(){ $('#confirmModal').classList.remove('active'); });
                $('#searchInput').addEventListener('input',function(){ renderList(); });
                var topBtn=$('#backToTop');
                window.addEventListener('scroll',function(){ topBtn.style.display=window.scrollY>500?'flex':'none'; });
                topBtn.addEventListener('click',function(){ window.scrollTo({top:0,behavior:'smooth'}); });
                var ovs=$$('.modal-overlay'); for(var i=0;i<ovs.length;i++){(function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('active');});})(ovs[i]);}
            }

            window._blogApp = { viewArticle:viewArticle, editArticle:openEditor, confirmDeleteArticle:confirmDel };
            async function init() {
                initParticles(); bindEvents();
                await loadArticles(); await checkLogin();
                renderList(); renderTags();
            }
            init();
        })();
    </script>
</body>
</html>
