    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵·云笺 | 古风科技博客</title>

    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 18, 30, 0.85);
            --gold: #c9a96e;
            --gold-bright: #e0c78a;
            --gold-glow: rgba(201, 169, 110, 0.5);
            --vermillion: #c53b3b;
            --vermillion-glow: rgba(197, 59, 59, 0.5);
            --cyan-neon: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.45);
            --text-primary: #e8e0d5;
            --text-secondary: #b8b0a0;
            --text-muted: #7a7265;
            --border-subtle: rgba(180, 150, 100, 0.25);
            --border-glow: rgba(201, 169, 110, 0.5);
            --font-calligraphy: 'ZCOOL QingKe HuangYou', 'Ma Shan Zheng', 'STXingkai', '华文行楷', 'KaiTi', '楷体', serif;
            --font-body: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STSong', '宋体', 'KaiTi', serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            line-height: 1.7;
            letter-spacing: 0.02em;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="%23c9a96e" stroke-width="1.5" opacity="0.8"/><circle cx="12" cy="12" r="5" fill="%23c9a96e" opacity="0.4"/></svg>') 12 12, auto;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(80, 60, 40, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 180, 200, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(160, 100, 60, 0.08) 0%, transparent 55%);
            background-size: 200% 200%;
            animation: inkFlow 25s ease-in-out infinite alternate;
        }
        @keyframes inkFlow { 0% { background-position: 0% 0%; } 50% { background-position: 50% 70%; } 100% { background-position: 100% 30%; } }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        #rippleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 6px);
            opacity: 0.7;
        }
        .poem-float {
            position: fixed; bottom: 20px; left: 20px; z-index: 30;
            font-family: var(--font-calligraphy); font-size: 1.2rem;
            color: var(--gold); opacity: 0.7; letter-spacing: 4px;
            text-shadow: 0 0 10px var(--gold-glow); pointer-events: none;
            animation: poemFade 8s ease-in-out infinite;
        }
        @keyframes poemFade { 0%,100% { opacity: 0.3; transform: translateY(0); } 50% { opacity: 0.8; transform: translateY(-5px); } }
        .main-container {
            position: relative; z-index: 2;
            width: 100%; max-width: 1000px; margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .header {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.6rem; padding: 1rem 0 1.5rem;
            border-bottom: 1px solid var(--border-subtle); position: relative;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), var(--cyan-neon), var(--gold), transparent);
            box-shadow: 0 0 20px var(--gold-glow), 0 0 10px var(--cyan-glow);
            animation: headerGlow 3s ease-in-out infinite alternate;
        }
        @keyframes headerGlow { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .plaque {
            position: relative; display: inline-block;
            padding: 0.6rem 2.5rem;
            background: linear-gradient(180deg, rgba(30,22,14,0.95) 0%, rgba(20,14,8,0.95) 100%);
            border: 2px solid #5a3e22; border-radius: 6px;
            box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.5), 0 0 0 6px #2a1405, 0 10px 30px rgba(0,0,0,0.6), 0 0 60px var(--gold-glow);
            text-align: center;
            animation: plaqueFloat 4s ease-in-out infinite;
        }
        @keyframes plaqueFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-3px) rotate(0.3deg); } 75% { transform: translateY(2px) rotate(-0.2deg); } }
        .plaque-title {
            font-family: var(--font-calligraphy); font-size: clamp(2rem, 4vw, 3rem);
            color: #e8d5a3; letter-spacing: 6px;
            text-shadow: 0 0 15px rgba(200,160,60,0.7), 0 0 30px rgba(180,130,40,0.5);
            animation: textShine 4s ease-in-out infinite alternate;
        }
        @keyframes textShine { 0% { text-shadow: 0 0 10px rgba(200,160,60,0.6); } 100% { text-shadow: 0 0 20px rgba(220,180,80,0.9); } }
        .subtitle { font-family: var(--font-body); font-size: 0.9rem; color: var(--text-muted); letter-spacing: 2px; text-shadow: 0 0 8px var(--cyan-glow); }
        .user-area { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; justify-content: center; margin-top: 0.3rem; }
        .greeting { font-size: 0.9rem; color: var(--text-secondary); background: rgba(255,250,240,0.05); padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid rgba(180,150,100,0.3); }
        .btn {
            font-family: var(--font-body); background: rgba(20,18,28,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(180,150,100,0.4); color: var(--text-primary);
            padding: 0.45rem 1.1rem; border-radius: 24px; font-size: 0.9rem;
            cursor: pointer; transition: all var(--transition-smooth); letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; overflow: hidden;
        }
        .btn:hover { background: rgba(40,32,20,0.8); border-color: var(--gold); color: #fff; box-shadow: 0 0 20px var(--gold-glow); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn.admin-btn { border-color: rgba(197,59,59,0.5); color: #e8b0b0; background: rgba(30,15,15,0.7); }
        .btn.primary-btn { background: rgba(180,130,50,0.2); border-color: var(--gold); color: var(--gold-bright); font-weight: bold; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; border-radius: 18px; }

        .toolbar { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center; margin-bottom: 0.5rem; }
        .search-box {
            flex: 1; min-width: 200px; padding: 0.5rem 1rem;
            background: rgba(20,18,28,0.6); backdrop-filter: blur(8px);
            border: 1px solid var(--border-subtle); border-radius: 24px;
            color: var(--text-primary); font-family: var(--font-body); font-size: 0.9rem;
            outline: none; transition: var(--transition-smooth);
        }
        .tag-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .tag-chip {
            background: rgba(180,150,100,0.1); border: 1px solid rgba(180,150,100,0.3);
            padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.75rem;
            color: var(--gold); cursor: pointer; transition: var(--transition-smooth);
        }
        .tag-chip.active { background: rgba(200,150,60,0.3); border-color: var(--gold); }

        .articles-grid { display: grid; grid-template-columns: 1fr; gap: 1.3rem; }
        @media (min-width: 768px) { .articles-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); } }
        .article-card {
            background: rgba(18, 18, 30, 0.75); backdrop-filter: blur(18px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
            padding: 1.4rem 1.5rem; cursor: pointer;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; overflow: hidden;
            box-shadow: 0 4px 25px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; gap: 0.7rem;
        }
        .article-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,240,0.05), transparent); transition: left 0.7s ease; }
        .article-card:hover::before { left: 100%; }
        .article-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px var(--gold-glow); border-color: var(--gold); }
        .article-card.pinned { border-color: var(--vermillion); }
        .article-card.pinned::after { content: '📌 置顶'; position: absolute; top: 12px; right: 15px; font-size: 0.7rem; color: var(--vermillion); }
        .card-title { font-family: var(--font-calligraphy); font-size: 1.3rem; color: var(--gold-bright); letter-spacing: 2px; }
        .card-seal {
            width: 44px; height: 44px; background: var(--vermillion); color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; box-shadow: 0 0 15px rgba(197,59,59,0.7);
            animation: sealGlow 2s ease-in-out infinite alternate;
        }
        @keyframes sealGlow { 0% { box-shadow: 0 0 8px rgba(197,59,59,0.5); } 100% { box-shadow: 0 0 20px rgba(220,80,80,0.9); } }
        .author-badge { font-size: 0.8rem; color: var(--gold); margin-left: auto; }
        .author-badge::before { content: '✍️ '; }

        .article-detail {
            background: var(--bg-card); backdrop-filter: blur(14px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
            padding: 1.8rem; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: scrollUnfold 0.8s ease-out;
            transform-origin: top center;
        }
        @keyframes scrollUnfold { 0% { transform: scaleY(0.3); opacity: 0; } 100% { transform: scaleY(1); opacity: 1; } }
        .detail-content h2 { border-left: 3px solid var(--gold); padding-left: 0.8rem; }
        .modal { border: 1px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px var(--gold-glow); }
        .toast { backdrop-filter: blur(12px); }
        #backToTop { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; border-radius: 50%; background: rgba(20,18,28,0.8); border: 1px solid var(--gold); color: var(--gold-bright); font-size: 1.5rem; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 50; box-shadow: 0 0 20px var(--gold-glow); }
        .hidden { display: none !important; }
        .view { display: none; }
        .view.active { display: block; }
        .quota-tip { font-size: 0.8rem; color: var(--cyan-neon); margin-left: 0.5rem; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="particleCanvas"></canvas>
    <canvas id="rippleCanvas"></canvas>
    <div class="poem-float" id="poemFloat">☯ 且将新火试新茶，诗酒趁年华 ☯</div>
    <div id="toastContainer"></div>
    <div id="backToTop">⬆</div>

    <div class="main-container">
        <header class="header">
            <div class="plaque"><h1 class="plaque-title">墨韵·云笺</h1></div>
            <p class="subtitle">✦ 古风为骨 · 科技为翼 ✦</p>
            <div class="user-area" id="userArea">
                <span class="greeting" id="greetingText">未登录·过客</span>
                <button class="btn" id="loginBtn">🔑 登 录</button>
                <button class="btn admin-btn hidden" id="adminPanelBtn">⚙️ 管理</button>
                <button class="btn hidden" id="logoutBtn">🚪 登 出</button>
            </div>
        </header>

        <div class="view active" id="viewList">
            <div class="toolbar">
                <input type="text" class="search-box" id="searchInput" placeholder="搜索文章标题、摘要或标签...">
                <div class="tag-filter" id="tagFilter"></div>
            </div>
            <div style="display:flex;justify-content:flex-end;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
                <button class="btn primary-btn hidden" id="applyArticleBtn">📝 申请发表</button>
                <span id="applyQuota" class="quota-tip hidden"></span>
                <button class="btn primary-btn hidden" id="newArticleBtn">📝 撰写新篇</button>
            </div>
            <div class="articles-grid" id="articlesGrid"></div>
            <div class="empty-state hidden" id="emptyState"><span class="empty-icon">📜</span> 尚无文章，静待墨香</div>
        </div>

        <div class="view" id="viewDetail">
            <button class="btn" id="backToListBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="article-detail" id="articleDetailContent"></div>
        </div>

        <div class="view" id="viewAdmin">
            <button class="btn" id="backFromAdminBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="admin-panel" id="adminPanelContent">
                <div class="admin-header">
                    <h3>🔰 文章管理</h3>
                    <div style="display:flex;gap:0.5rem;">
                        <button class="btn primary-btn" id="adminNewArticleBtn">📝 撰写新篇</button>
                        <button class="btn admin-btn" id="reviewTabBtn">📋 待审核(<span id="pendingCount">0</span>)</button>
                    </div>
                </div>
                <div id="adminArticlesList"></div>
                <div id="reviewPanel" style="display:none;margin-top:1.5rem;">
                    <h3 style="color:#e8b0b0;">📋 待审核文章</h3>
                    <div id="reviewList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="close-btn" id="closeLoginModal">&times;</button>
            <h2>🔑 登录云笺</h2>
            <form onsubmit="return false">
                <div class="input-group"><label>账号</label><input type="text" id="loginUsername" autocomplete="username"></div>
                <div class="input-group"><label>密码</label><input type="password" id="loginPassword" autocomplete="current-password"></div>
                <div class="modal-actions"><button class="btn primary-btn" id="submitLogin">登 录</button></div>
            </form>
        </div>
    </div>
    <!-- 文章编辑模态框 -->
    <div class="modal-overlay" id="articleModal">
        <div class="modal" style="max-width:640px;">
            <button class="close-btn" id="closeArticleModal">&times;</button>
            <h2 id="articleModalTitle">📝 撰写文章</h2>
            <form onsubmit="return false">
                <div class="input-group"><label>标题</label><input type="text" id="articleTitle"></div>
                <div class="input-group"><label>摘要</label><input type="text" id="articleSummary"></div>
                <div class="input-group"><label>标签（逗号分隔）</label><input type="text" id="articleTags"></div>
                <div class="input-group"><label>印章</label><input type="text" id="articleSeal" maxlength="2" placeholder="墨"></div>
                <div class="input-group"><label>置顶</label><input type="checkbox" id="articlePinned" style="width:auto;"> 置顶</div>
                <div class="input-group"><label>内容</label><textarea id="articleContent"></textarea></div>
                <input type="hidden" id="articleEditId">
                <div class="modal-actions"><button class="btn primary-btn" id="submitArticle">发 布</button><button class="btn" id="cancelArticle">取 消</button></div>
            </form>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width:400px;text-align:center;">
            <h2 style="color:#e8b0b0;">⚠️ 确认删除</h2>
            <p style="color:var(--text-secondary);">此操作不可恢复</p>
            <div class="modal-actions"><button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button><button class="btn" id="cancelDeleteBtn">取 消</button></div>
            <input type="hidden" id="confirmDeleteId">
        </div>
    </div>
    <!-- 申请文章模态框 -->
    <div class="modal-overlay" id="applyModal">
        <div class="modal" style="max-width:640px;">
            <button class="close-btn" id="closeApplyModal">&times;</button>
            <h2>📝 申请发表文章</h2>
            <p id="applyLimitInfo" class="quota-info"></p>
            <form onsubmit="return false">
                <div class="input-group"><label>标题</label><input type="text" id="applyTitle"></div>
                <div class="input-group"><label>摘要</label><input type="text" id="applySummary"></div>
                <div class="input-group"><label>标签（逗号分隔）</label><input type="text" id="applyTags"></div>
                <div class="input-group"><label>印章</label><input type="text" id="applySeal" maxlength="2" placeholder="墨"></div>
                <div class="input-group"><label>内容</label><textarea id="applyContent"></textarea></div>
                <div class="modal-actions"><button class="btn primary-btn" id="submitApply">提 交</button><button class="btn" id="cancelApply">取 消</button></div>
            </form>

    </div>

    <script>
        (function() {
            var API_BASE = 'https://myzlm.serveousercontent.com';
            var $ = function(s) { return document.querySelector(s); };
            var $$ = function(s) { return document.querySelectorAll(s); };

            function escapeHtml(t) { var m = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}; return String(t).replace(/[&<>"']/g, function(c){return m[c];}); }
            function showToast(msg, type) { var t = type || 'success'; var c = $('#toastContainer'); var d = document.createElement('div'); d.className = 'toast toast-' + t; d.textContent = msg; c.appendChild(d); setTimeout(function(){ if(d.parentNode) d.remove(); }, 3000); }
            function formatDate(d) { if(!d) return ''; var dt = new Date(d); var ch = ['','元月','杏月','桃月','槐月','榴月','荷月','兰月','桂月','菊月','露月','葭月','腊月']; var m = dt.getMonth() + 1; var g = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸']; var z = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥']; return g[(dt.getFullYear()-4)%10] + z[(dt.getFullYear()-4)%12] + '年·' + (ch[m]||m+'月') + dt.getDate() + '日'; }
            function calcReadTime(t) { var w = (t||'').replace(/[^\u4e00-\u9fa5a-zA-Z]/g,'').length; return Math.max(1, Math.round(w/400)); }

            var currentUser = null, articles = [], pendingApps = [], currentView = 'list', pendingDeleteId = null, activeTag = null, showReview = false;
            var applyQuotaRemaining = 0;

            async function apiCall(url, opt, silent) {
                opt = opt || {}; silent = silent || false;
                var config = { credentials:'include', headers:{'Content-Type':'application/json'} };
                if (opt.method) config.method = opt.method;
                if (opt.body && typeof opt.body === 'object') config.body = JSON.stringify(opt.body);
                try {
                    var res = await fetch(API_BASE + url, config);
                    if (!res.ok) { if(silent) return null; var d = await res.json().catch(function(){return{};}); throw new Error(d.error || '请求失败 (' + res.status + ')'); }
                    var txt = await res.text();
                    return txt ? JSON.parse(txt) : null;
                } catch(e) { if(silent) return null; throw e; }
            }

            async function checkLogin() { var data = await apiCall('/api/me',{},true); currentUser = (data && data.username) ? data : null; updateUI(); }
            function updateUI() {
                var g = $('#greetingText'), l = $('#loginBtn'), o = $('#logoutBtn'), a = $('#adminPanelBtn'),
                    n = $('#newArticleBtn'), ap = $('#applyArticleBtn');
                if (currentUser) {
                    g.textContent = (currentUser.role === 'admin' ? '🔰' : '📖') + ' ' + currentUser.username;
                    l.classList.add('hidden'); o.classList.remove('hidden');
                    if (currentUser.role === 'admin') { a.classList.remove('hidden'); n.classList.remove('hidden'); ap.classList.add('hidden'); }
                    else { a.classList.add('hidden'); n.classList.add('hidden'); ap.classList.remove('hidden'); }
                } else {
                    g.textContent = '未登录·过客'; l.classList.remove('hidden'); o.classList.add('hidden');
                    a.classList.add('hidden'); n.classList.add('hidden'); ap.classList.add('hidden');
                }
                if (currentView === 'list') { renderList(); renderTags(); }
                if (currentView === 'admin') renderAdmin();
                updateApplyQuota();
            }

            async function login(u, p) {
                var data = await apiCall('/api/login', { method:'POST', body:{username:u, password:p} });
                currentUser = { username:data.username, role:data.role };
                updateUI(); showToast('欢迎回来，' + data.username);
            }
            async function logout() { await apiCall('/api/logout',{method:'POST'},true); currentUser = null; updateUI(); showToast('已登出'); switchView('list'); }
            function switchView(v) {
                currentView = v;
                var views = $$('.view'); for (var i=0; i<views.length; i++) views[i].classList.remove('active');
                var target = $('#view' + v.charAt(0).toUpperCase() + v.slice(1)); if (target) target.classList.add('active');
                if (v === 'list') { renderList(); renderTags(); }
                if (v === 'admin') renderAdmin();
                window.scrollTo({ top:0 });
            }

            async function loadArticles() {
                try { var data = await apiCall('/api/articles'); articles = Array.isArray(data) ? data : []; }
                catch(e) { articles = []; }
                articles.sort(function(a,b){ return (b.pinned?1:0) - (a.pinned?1:0) || new Date(b.createdAt) - new Date(a.createdAt); });
            }
            async function loadApplications() {
                if (!currentUser || currentUser.role !== 'admin') return;
                try { pendingApps = await apiCall('/api/article-applications'); } catch(e) { pendingApps = []; }
                var count = $('#pendingCount'); if (count) count.textContent = pendingApps.length;
                if (showReview) renderReview();
            }
            async function updateApplyQuota() {
                if (!currentUser || currentUser.role === 'admin') { $('#applyQuota').classList.add('hidden'); return; }
                try {
                    var data = await apiCall('/api/apply-quota');
                    applyQuotaRemaining = data.remaining;
                    $('#applyQuota').textContent = '剩余 ' + applyQuotaRemaining + ' 次';
                    $('#applyQuota').classList.remove('hidden');
                } catch(e) { $('#applyQuota').classList.add('hidden'); }
            }

            function getFiltered() {
                var s = $('#searchInput') ? $('#searchInput').value.trim().toLowerCase() : '';
                return articles.filter(function(a){
                    var ms = true; if (s) { var title = (a.title||'').toLowerCase(), summary = (a.summary||'').toLowerCase(), tags = (a.tags||[]).join(' ').toLowerCase(); ms = title.indexOf(s)!==-1 || summary.indexOf(s)!==-1 || tags.indexOf(s)!==-1; }
                    var mt = !activeTag || (a.tags && a.tags.indexOf(activeTag)!==-1);
                    return ms && mt;
                });
            }
            function renderList() {
                var grid = $('#articlesGrid'), empty = $('#emptyState');
                var filtered = getFiltered();
                if (!filtered.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
                empty.classList.add('hidden');
                var html = '';
                for (var i=0; i<filtered.length; i++) {
                    var a = filtered[i];
                    html += '<div class="article-card' + (a.pinned?' pinned':'') + '" data-id="' + escapeHtml(a.id) + '">';
                    html += '<div class="card-header"><span class="card-title">' + escapeHtml(a.title) + '</span><span class="card-seal">' + escapeHtml(a.seal||'墨') + '</span></div>';
                    html += '<p class="card-summary">' + escapeHtml(a.summary||'') + '</p>';
                    html += '<div class="card-meta"><span class="card-date">' + formatDate(a.createdAt) + '</span><span class="reading-time">' + calcReadTime(a.content) + ' 分钟</span>';
                    var tags = a.tags || []; for (var j=0; j<tags.length; j++) html += '<span class="card-tag">' + escapeHtml(tags[j]) + '</span>';
                    html += '<span class="author-badge">' + escapeHtml(a.author || '佚名') + '</span>';
                    html += '</div></div>';
                }
                grid.innerHTML = html;
                grid.onclick = function(ev) { var card = ev.target.closest('.article-card'); if (card) viewArticle(card.dataset.id); };
            }
            function renderTags() {
                var container = $('#tagFilter');
                var all = {}; for (var i=0; i<articles.length; i++) { var tags = articles[i].tags||[]; for (var j=0; j<tags.length; j++) all[tags[j]] = true; }
                var arr = Object.keys(all);
                container.innerHTML = '<span class="tag-chip' + (activeTag?'':' active') + '" data-tag="">全部</span>';
                for (var k=0; k<arr.length; k++) container.innerHTML += '<span class="tag-chip' + (activeTag===arr[k]?' active':'') + '" data-tag="' + escapeHtml(arr[k]) + '">' + escapeHtml(arr[k]) + '</span>';
                container.onclick = function(ev) { if (ev.target.classList.contains('tag-chip')) { activeTag = ev.target.dataset.tag || null; renderList(); renderTags(); } };
            }

            async function viewArticle(id) {
                try { var a = await apiCall('/api/articles/' + encodeURIComponent(id)); if (!a) { showToast('文章不存在','error'); return; } renderDetail(a); switchView('detail'); }
                catch(e) { showToast('加载失败: ' + e.message, 'error'); }
            }
            function renderDetail(a) {
                var container = $('#articleDetailContent');
                var contentHtml = ''; try { contentHtml = marked.parse(a.content); } catch(e) { contentHtml = escapeHtml(a.content).replace(/\n/g,'<br>'); }
                container.innerHTML = '<div class="detail-header"><h1 class="detail-title">' + escapeHtml(a.title) + '</h1><div class="detail-meta"><span>📅 ' + formatDate(a.createdAt) + '</span>' + (a.updatedAt&&a.updatedAt!==a.createdAt?'<span>✏️ 更新于 ' + formatDate(a.updatedAt) + '</span>':'') + ((a.tags||[]).map(function(t){return '<span class="detail-tag">' + escapeHtml(t) + '</span>';}).join('')) + '<span class="author-badge" style="margin-left:auto;">' + escapeHtml(a.author||'佚名') + '</span></div></div><div class="detail-content">' + contentHtml + '</div><div class="detail-actions"></div>';
                if (currentUser && currentUser.role === 'admin') {
                    var actions = container.querySelector('.detail-actions');
                    var eb = document.createElement('button'); eb.className = 'btn btn-sm'; eb.textContent = '✏️ 编辑'; eb.onclick = function() { openEditor(a.id); };
                    var db = document.createElement('button'); db.className = 'btn btn-sm btn-danger'; db.textContent = '🗑️ 删除'; db.onclick = function() { confirmDel(a.id, a.title); };
                    actions.appendChild(eb); actions.appendChild(db);
                }
            }
            async function openEditor(id) {
                var modal = $('#articleModal'), titleEl = $('#articleModalTitle'), submitBtn = $('#submitArticle');
                if (id) {
                    var a = await apiCall('/api/articles/' + encodeURIComponent(id));
                    if (!a) { showToast('文章不存在','error'); return; }
                    titleEl.textContent = '✏️ 编辑文章'; submitBtn.textContent = '保 存';
                    $('#articleTitle').value = a.title||''; $('#articleSummary').value = a.summary||''; $('#articleTags').value = (a.tags||[]).join(', '); $('#articleSeal').value = a.seal||'墨';
                    $('#articleContent').value = a.content||''; $('#articlePinned').checked = !!a.pinned; $('#articleEditId').value = id;
                } else {
                    titleEl.textContent = '📝 撰写新篇'; submitBtn.textContent = '发 布';
                    $('#articleTitle').value = ''; $('#articleSummary').value = ''; $('#articleTags').value = ''; $('#articleSeal').value = '墨'; $('#articleContent').value = ''; $('#articlePinned').checked = false; $('#articleEditId').value = '';
                }
                modal.classList.add('active');
            }
            async function submitArticle() {
                var title = $('#articleTitle').value.trim(), content = $('#articleContent').value.trim();
                if (!title || !content) return showToast('标题和内容不能为空','error');
                var data = { title:title, content:content, summary:$('#articleSummary').value.trim(), tags:$('#articleTags').value.split(',').map(function(t){return t.trim();}).filter(Boolean), seal:$('#articleSeal').value.trim()||'墨', pinned:$('#articlePinned').checked };
                var editId = $('#articleEditId').value;
                try {
                    if (editId) { await apiCall('/api/articles/' + encodeURIComponent(editId), { method:'PUT', body:data }); showToast('文章已更新'); }
                    else { await apiCall('/api/articles', { method:'POST', body:data }); showToast('文章已发布'); }
                    $('#articleModal').classList.remove('active');
                    await loadArticles();
                    if (currentView==='list') { renderList(); renderTags(); }
                    if (currentView==='admin') renderAdmin();
                } catch(e) { showToast('操作失败: ' + e.message, 'error'); }
            }
            function confirmDel(id, title) { pendingDeleteId = id; $('#confirmModal').classList.add('active'); $('#confirmModal').querySelector('p').textContent = '此操作不可恢复，确定要删除「' + (title||'这篇文章') + '」吗？'; }
            async function executeDelete() {
                if (!pendingDeleteId) return;
                try { await apiCall('/api/articles/' + encodeURIComponent(pendingDeleteId), { method:'DELETE' }); showToast('已删除'); }
                catch(e) { showToast('删除失败: ' + e.message, 'error'); }
                $('#confirmModal').classList.remove('active'); pendingDeleteId = null;
                await loadArticles();
                if (currentView==='list') { renderList(); renderTags(); }
                if (currentView==='admin') renderAdmin();
                if (currentView==='detail') switchView('list');
            }
            function renderAdmin() {
                var container = $('#adminArticlesList'), reviewPanel = $('#reviewPanel');
                if (showReview) { container.style.display = 'none'; reviewPanel.style.display = 'block'; renderReview(); }
                else {
                    container.style.display = 'block'; reviewPanel.style.display = 'none';
                    var html = '';
                    for (var i=0; i<articles.length; i++) {
                        var a = articles[i];
                        html += '<div class="article-manage-item"><div class="item-info"><span class="item-title">' + escapeHtml(a.title) + '</span><span class="item-date">' + formatDate(a.createdAt) + ' by ' + escapeHtml(a.author||'佚名') + '</span></div><div class="item-actions"><button class="btn btn-sm edit-btn" data-id="' + escapeHtml(a.id) + '">✏️</button><button class="btn btn-sm btn-danger delete-btn" data-id="' + escapeHtml(a.id) + '">🗑️</button></div></div>';
                    }
                    container.innerHTML = html;
                    container.onclick = function(ev) { if (ev.target.classList.contains('edit-btn')) openEditor(ev.target.dataset.id); else if (ev.target.classList.contains('delete-btn')) confirmDel(ev.target.dataset.id, ev.target.dataset.title); };
                }
            }
            function renderReview() {
                var container = $('#reviewList');
                if (!pendingApps.length) { container.innerHTML = '<p style="color:var(--text-muted);">暂无待审核文章</p>'; return; }
                var html = '';
                for (var i=0; i<pendingApps.length; i++) {
                    var a = pendingApps[i];
                    html += '<div class="article-manage-item"><div class="item-info"><span class="item-title">' + escapeHtml(a.title) + '</span><span class="item-date">' + formatDate(a.createdAt) + ' by ' + escapeHtml(a.applicant) + '</span></div><div class="item-actions"><button class="btn btn-sm approve-btn" data-id="' + escapeHtml(a.id) + '">✅ 通过</button><button class="btn btn-sm btn-danger reject-btn" data-id="' + escapeHtml(a.id) + '">❌ 拒绝</button></div></div>';
                }
                container.innerHTML = html;
                container.onclick = function(ev) { var id = ev.target.dataset.id; if (ev.target.classList.contains('approve-btn')) approveApplication(id); else if (ev.target.classList.contains('reject-btn')) rejectApplication(id); };
            }
            async function approveApplication(id) {
                try { await apiCall('/api/article-applications/' + id + '/approve', { method:'POST' }); showToast('已批准并发布'); }
                catch(e) { showToast('操作失败: ' + e.message, 'error'); }
                await loadApplications(); await loadArticles();
                if (currentView==='list') { renderList(); renderTags(); }
            }
            async function rejectApplication(id) {
                try { await apiCall('/api/article-applications/' + id, { method:'DELETE' }); showToast('已拒绝'); }
                catch(e) { showToast('操作失败: ' + e.message, 'error'); }
                await loadApplications();
            }

            // ========== 特效系统 ==========
            function initRipples() {
                var canvas = $('#rippleCanvas');
                var ctx = canvas.getContext('2d');
                var w, h;
                var ripples = [];
                function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
                window.addEventListener('resize', resize); resize();
                document.addEventListener('click', function(e) {
                    var colors = ['rgba(201,169,110,0.8)', 'rgba(197,59,59,0.7)', 'rgba(0,229,255,0.6)', 'rgba(80,60,40,0.7)'];
                    ripples.push({ x:e.clientX, y:e.clientY, radius:5, maxRadius:60+Math.random()*60, opacity:0.8, color:colors[Math.floor(Math.random()*colors.length)], speed:1.2+Math.random()*0.8 });
                    if (ripples.length > 20) ripples.shift();
                });
                function animate() {
                    ctx.clearRect(0,0,w,h);
                    for (var i=ripples.length-1; i>=0; i--) {
                        var r = ripples[i]; r.radius += r.speed; r.opacity -= 0.015;
                        if (r.opacity <= 0 || r.radius > r.maxRadius) ripples.splice(i,1);
                        else { ctx.beginPath(); ctx.arc(r.x,r.y,r.radius,0,Math.PI*2); var g=ctx.createRadialGradient(r.x,r.y,r.radius*0.2,r.x,r.y,r.radius); g.addColorStop(0,r.color); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.globalAlpha=r.opacity; ctx.fill(); ctx.globalAlpha=1; }
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            }

            function initParticles() {
                var canvas = $('#particleCanvas');
                var ctx = canvas.getContext('2d');
                var w, h, particles = [];
                function resize() { w=window.innerWidth; h=window.innerHeight; canvas.width=w; canvas.height=h; }
                window.addEventListener('resize', resize); resize();
                function drawPetal(ctx, x, y, size, rot, color) { ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.fillStyle=color; ctx.beginPath(); ctx.ellipse(0,0,size*0.6,size*0.2,0,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.ellipse(0,0,size*0.2,size*0.6,0,0,Math.PI*2); ctx.fill(); ctx.restore(); }
                function Particle() { this.reset(true); }
                Particle.prototype.reset = function(init) { this.x=Math.random()*w; this.y=init?Math.random()*h:-20; this.size=1+Math.random()*3; this.speedY=0.3+Math.random()*1.5; this.speedX=(Math.random()-0.5)*0.8; this.opacity=0.3+Math.random()*0.7; this.type=Math.random()>0.6?'petal':(Math.random()>0.5?'gold':'cyan'); if(this.type==='petal'){ this.color='rgba(232,160,170,'+this.opacity+')'; this.rotation=Math.random()*Math.PI*2; this.rotSpeed=(Math.random()-0.5)*0.02; } else if(this.type==='gold') this.color='rgba(200,160,60,'+this.opacity+')'; else this.color='rgba(0,220,240,'+this.opacity+')'; };
                Particle.prototype.update = function() { this.y+=this.speedY; this.x+=Math.sin(this.y*0.02)*this.speedX; if(this.type==='petal') this.rotation+=this.rotSpeed; if(this.y>h+30||this.x<-30||this.x>w+30) this.reset(false); };
                Particle.prototype.draw = function(ctx) { ctx.globalAlpha=this.opacity; if(this.type==='petal') drawPetal(ctx,this.x,this.y,this.size*2,this.rotation,this.color); else { ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fill(); } ctx.globalAlpha=1; };
                for (var i=0; i<80; i++) particles.push(new Particle());
                function animate() { ctx.clearRect(0,0,w,h); for(var i=0;i<particles.length;i++){ particles[i].update(); particles[i].draw(ctx); } requestAnimationFrame(animate); }
                animate();
            }

            var poems = ['☯ 且将新火试新茶，诗酒趁年华 ☯','☯ 醉后不知天在水，满船清梦压星河 ☯','☯ 云想衣裳花想容，春风拂槛露华浓 ☯','☯ 银烛秋光冷画屏，轻罗小扇扑流萤 ☯','☯ 沧海月明珠有泪，蓝田日暖玉生烟 ☯'];
            var poemIdx = 0;
            setInterval(function(){ poemIdx = (poemIdx+1)%poems.length; var el = document.getElementById('poemFloat'); if(el) el.textContent = poems[poemIdx]; }, 10000);

            function bindEvents() {
                $('#loginBtn').addEventListener('click', function(){ $('#loginModal').classList.add('active'); });
                $('#closeLoginModal').addEventListener('click', function(){ $('#loginModal').classList.remove('active'); });
                $('#submitLogin').addEventListener('click', async function(){
                    var u=$('#loginUsername').value.trim(), p=$('#loginPassword').value;
                    if (!u||!p) return showToast('请输入账号密码','error');
                    try { await login(u,p); $('#loginModal').classList.remove('active'); $('#loginUsername').value=''; $('#loginPassword').value=''; await loadArticles(); renderList(); renderTags(); }
                    catch(e) { showToast('登录失败: '+e.message,'error'); }
                });
                $('#logoutBtn').addEventListener('click', logout);
                $('#adminPanelBtn').addEventListener('click', function(){ switchView('admin'); });
                $('#backFromAdminBtn').addEventListener('click', function(){ switchView('list'); });
                $('#newArticleBtn').addEventListener('click', function(){ openEditor(null); });
                $('#adminNewArticleBtn').addEventListener('click', function(){ openEditor(null); });
                $('#closeArticleModal').addEventListener('click', function(){ $('#articleModal').classList.remove('active'); });
                $('#cancelArticle').addEventListener('click', function(){ $('#articleModal').classList.remove('active'); });
                $('#submitArticle').addEventListener('click', submitArticle);
                $('#backToListBtn').addEventListener('click', function(){ switchView('list'); });
                $('#confirmDeleteBtn').addEventListener('click', executeDelete);
                $('#cancelDeleteBtn').addEventListener('click', function(){ $('#confirmModal').classList.remove('active'); });
                $('#searchInput').addEventListener('input', function(){ renderList(); });
                var topBtn = $('#backToTop');
                window.addEventListener('scroll', function(){ topBtn.style.display = window.scrollY>500?'flex':'none'; });
                topBtn.addEventListener('click', function(){ window.scrollTo({ top:0, behavior:'smooth' }); });

                $('#applyArticleBtn').addEventListener('click', function(){
                    if (applyQuotaRemaining <= 0) { showToast('今日申请次数已用尽，请明天再试', 'error'); return; }
                    $('#applyLimitInfo').textContent = '今日还可提交 ' + applyQuotaRemaining + ' 次';
                    $('#applyModal').classList.add('active');
                });
                $('#closeApplyModal').addEventListener('click', function(){ $('#applyModal').classList.remove('active'); });
                $('#cancelApply').addEventListener('click', function(){ $('#applyModal').classList.remove('active'); });
                $('#submitApply').addEventListener('click', async function(){
                    if (applyQuotaRemaining <= 0) { showToast('今日申请次数已用尽', 'error'); return; }
                    var title=$('#applyTitle').value.trim(), content=$('#applyContent').value.trim();
                    if (!title||!content) return showToast('标题和内容不能为空','error');
                    var data = { title:title, content:content, summary:$('#applySummary').value.trim(), tags:$('#applyTags').value.split(',').map(function(t){return t.trim();}).filter(Boolean), seal:$('#applySeal').value.trim()||'墨' };
                    try {
                        await apiCall('/api/article-applications', { method:'POST', body:data });
                        showToast('申请已提交，等待管理员审核');
                        $('#applyModal').classList.remove('active');
                        $('#applyTitle').value=''; $('#applyContent').value=''; $('#applySummary').value=''; $('#applyTags').value=''; $('#applySeal').value='墨';
                        updateApplyQuota();
                    } catch(e) { showToast('提交失败: '+e.message,'error'); }
                });

                $('#reviewTabBtn').addEventListener('click', function(){
                    showReview = !showReview;
                    this.innerHTML = showReview ? '📝 管理文章' : '📋 待审核(<span id="pendingCount">' + pendingApps.length + '</span>)';
                    renderAdmin();
                });

                var overlays = $$('.modal-overlay');
                for (var i=0; i<overlays.length; i++) {
                    (function(ov){ ov.addEventListener('click', function(e){ if (e.target===ov) ov.classList.remove('active'); }); })(overlays[i]);
                }
            }

            window._blogApp = { viewArticle:viewArticle, editArticle:openEditor, confirmDeleteArticle:confirmDel };
            async function init() {
                initRipples();
                initParticles();
                bindEvents();
                await loadArticles();
                await checkLogin();
                renderList();
                renderTags();
            }
            init();
        })();
    </script>
</body>
</html>
