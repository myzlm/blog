<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨韵·云笺 | 古风科技博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 18, 30, 0.85);
            --bg-card-hover: rgba(22, 22, 38, 0.92);
            --gold: #c9a96e;
            --gold-bright: #e0c78a;
            --gold-glow: rgba(201, 169, 110, 0.5);
            --vermillion: #c53b3b;
            --vermillion-glow: rgba(197, 59, 59, 0.5);
            --cyan-neon: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.45);
            --text-primary: #e8e0d5;
            --text-secondary: #b8b0a0;
            --text-muted: #7a7265;
            --border-subtle: rgba(180, 150, 100, 0.25);
            --border-glow: rgba(201, 169, 110, 0.5);
            --font-calligraphy: 'ZCOOL QingKe HuangYou', 'Ma Shan Zheng', 'STXingkai', '华文行楷', 'KaiTi', '楷体', serif;
            --font-body: 'ZCOOL XiaoWei', 'Noto Serif SC', 'STSong', '宋体', 'KaiTi', serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition-fast: 0.2s ease;
            --transition-smooth: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border-subtle);
            --shadow-card-hover: 0 8px 32px rgba(0, 0, 0, 0.55), 0 0 0 2px var(--border-glow), 0 0 20px var(--gold-glow);
            --shadow-glow-gold: 0 0 15px var(--gold-glow), 0 0 30px rgba(201, 169, 110, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body {
            font-family: var(--font-body);
            min-height: 100vh;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(201, 169, 110, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(0, 229, 255, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(197, 59, 59, 0.03) 0%, transparent 50%),
                linear-gradient(180deg, #0a0a0f 0%, #0d0d16 30%, #0f0f18 60%, #0a0a0f 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            line-height: 1.7;
            letter-spacing: 0.02em;
        }
        body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.003) 2px, rgba(255,255,255,0.003) 4px),
                radial-gradient(ellipse at 15% 30%, rgba(200,180,140,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 55%, rgba(180,160,120,0.04) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 75%, rgba(160,140,100,0.05) 0%, transparent 45%);
            opacity: 0.7;
        }
        #particleCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.015) 3px, rgba(0,0,0,0.015) 6px);
            opacity: 0.5;
        }
        .main-container {
            position: relative; z-index: 2;
            width: 100%; max-width: 1000px; margin: 0 auto;
            padding: 1.5rem 1rem 3rem;
            display: flex; flex-direction: column; gap: 1.5rem;
        }
        .header {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.6rem; padding: 1rem 0 1.5rem;
            border-bottom: 1px solid var(--border-subtle); position: relative;
        }
        .header::after {
            content: ''; position: absolute; bottom: -1px; left: 20%; width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: var(--shadow-glow-gold);
        }
        .plaque-wrapper { position: relative; display: inline-block; }
        .plaque {
            position: relative; display: inline-block;
            padding: 0.6rem 2.5rem;
            background: linear-gradient(180deg, rgba(30,22,14,0.95) 0%, rgba(20,14,8,0.95) 30%, rgba(25,17,10,0.95) 60%, rgba(15,9,5,0.95) 100%);
            border: 2px solid #5a3e22; border-radius: 6px;
            box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.5), 0 0 0 6px #2a1405, 0 6px 20px rgba(0,0,0,0.6), inset 0 0 30px rgba(200,160,60,0.08), 0 0 40px var(--gold-glow);
            text-align: center;
            animation: plaquePulse 4s ease-in-out infinite;
        }
        @keyframes plaquePulse {
            0%,100% { box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.5), 0 0 0 6px #2a1405, 0 6px 20px rgba(0,0,0,0.6), inset 0 0 30px rgba(200,160,60,0.08), 0 0 40px var(--gold-glow); }
            50% { box-shadow: 0 0 0 1px #3a1f0a, 0 0 0 4px rgba(139,105,20,0.6), 0 0 0 6px #2a1405, 0 6px 20px rgba(0,0,0,0.6), inset 0 0 35px rgba(200,160,60,0.12), 0 0 55px var(--gold-glow); }
        }
        .plaque::before {
            content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 20px;
            background: radial-gradient(circle 6px, #c4a44a 35%, #6b4f10 55%, transparent 60%) 6px 5px,
                        radial-gradient(circle 6px, #c4a44a 35%, #6b4f10 55%, transparent 60%) 28px 5px;
            background-repeat: no-repeat; z-index: 1; pointer-events: none;
        }
        .plaque-title {
            font-family: var(--font-calligraphy);
            font-size: clamp(2rem, 4vw, 3rem); font-weight: normal;
            color: #e8d5a3; letter-spacing: 6px;
            text-shadow: 1px 0 0 rgba(0,0,0,0.7), -1px 0 0 rgba(0,0,0,0.4), 0 1px 0 rgba(0,0,0,0.6), 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(200,160,60,0.4), 0 0 25px rgba(180,130,40,0.3);
            position: relative; z-index: 1; white-space: nowrap; line-height: 1.3;
        }
        .plaque .shine-line {
            position: absolute; top: 0; left: -100%; width: 40%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,240,0.06), rgba(255,255,240,0.1), rgba(255,255,240,0.06), transparent);
            animation: plaqueShine 5s ease-in-out infinite; pointer-events: none; z-index: 0; border-radius: 4px;
        }
        @keyframes plaqueShine { 0% { left: -50%; } 55% { left: 110%; } 100% { left: 110%; } }
        .subtitle { font-family: var(--font-body); font-size: 0.9rem; color: var(--text-muted); letter-spacing: 2px; text-shadow: 0 0 8px var(--cyan-glow); margin-top: 0.2rem; }
        .user-area { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; justify-content: center; margin-top: 0.3rem; }
        .greeting { font-size: 0.9rem; color: var(--text-secondary); background: rgba(255,250,240,0.05); padding: 0.3rem 0.9rem; border-radius: 20px; border: 1px solid rgba(180,150,100,0.3); letter-spacing: 1px; }
        .btn {
            font-family: var(--font-body); background: rgba(20,18,28,0.7); backdrop-filter: blur(8px);
            border: 1px solid rgba(180,150,100,0.4); color: var(--text-primary);
            padding: 0.45rem 1.1rem; border-radius: 24px; font-size: 0.9rem;
            cursor: pointer; transition: all var(--transition-smooth); letter-spacing: 1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); position: relative; overflow: hidden;
        }
        .btn:hover { background: rgba(40,32,20,0.8); border-color: var(--gold); color: #fff; box-shadow: var(--shadow-glow-gold), 0 4px 16px rgba(0,0,0,0.4); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
        .btn.admin-btn { border-color: rgba(197,59,59,0.5); color: #e8b0b0; background: rgba(30,15,15,0.7); }
        .btn.admin-btn:hover { border-color: var(--vermillion); box-shadow: 0 0 20px var(--vermillion-glow), 0 4px 16px rgba(0,0,0,0.4); }
        .btn.primary-btn { background: rgba(180,130,50,0.2); border-color: var(--gold); color: var(--gold-bright); font-weight: bold; }
        .btn.primary-btn:hover { background: rgba(200,150,60,0.3); box-shadow: var(--shadow-glow-gold), 0 0 25px var(--gold-glow); }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; letter-spacing: 0.5px; border-radius: 18px; }
        .articles-grid { display: grid; grid-template-columns: 1fr; gap: 1.2rem; }
        @media (min-width: 768px) { .articles-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 1.4rem; } }
        .article-card {
            background: var(--bg-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border: 1px solid var(--border-subtle); border-radius: var(--radius-lg);
            padding: 1.4rem 1.5rem; cursor: pointer; transition: all var(--transition-smooth);
            box-shadow: var(--shadow-card); position: relative; overflow: hidden;
            text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 0.7rem;
        }
        .article-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,169,110,0.5), transparent);
            opacity: 0; transition: opacity var(--transition-smooth);
        }
        .article-card:hover { background: var(--bg-card-hover); transform: translateY(-3px); box-shadow: var(--shadow-card-hover); border-color: var(--border-glow); }
        .article-card:hover::before { opacity: 1; }
        .article-card .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.8rem; }
        .article-card .card-title {
            font-family: var(--font-calligraphy); font-size: 1.3rem;
            color: var(--gold-bright); letter-spacing: 2px;
            text-shadow: 0 0 6px rgba(200,160,60,0.3); line-height: 1.4; flex: 1;
        }
        .article-card .card-seal {
            flex-shrink: 0; width: 44px; height: 44px; background: var(--vermillion);
            color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-family: 'Ma Shan Zheng', var(--font-calligraphy); font-size: 1.4rem;
            box-shadow: 0 0 12px var(--vermillion-glow), 0 2px 6px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4); letter-spacing: 0;
        }
        .article-card .card-summary {
            color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .article-card .card-meta { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; font-size: 0.78rem; color: var(--text-muted); margin-top: auto; }
        .article-card .card-tag {
            display: inline-block; background: rgba(180,150,100,0.12); border: 1px solid rgba(180,150,100,0.3);
            padding: 0.2rem 0.6rem; border-radius: 14px; font-size: 0.75rem; letter-spacing: 1px; color: var(--gold);
        }
        .article-card .card-date { display: flex; align-items: center; gap: 0.3rem; color: var(--text-muted); }
        .article-card .card-date::before { content: '📅'; font-size: 0.7rem; filter: grayscale(0.5); }
        .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-family: var(--font-calligraphy); font-size: 1.2rem; letter-spacing: 2px; border: 2px dashed rgba(180,150,100,0.25); border-radius: var(--radius-lg); background: rgba(20,18,28,0.4); }
        .empty-state .empty-icon { font-size: 3rem; display: block; margin-bottom: 0.8rem; animation: floatIcon 3s ease-in-out infinite; }
        @keyframes floatIcon { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .article-detail { background: var(--bg-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 1.8rem; box-shadow: var(--shadow-card); animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .article-detail .detail-header { border-bottom: 1px solid var(--border-subtle); padding-bottom: 1.2rem; margin-bottom: 1.5rem; position: relative; }
        .article-detail .detail-header::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 40%; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); box-shadow: 0 0 8px var(--gold-glow); }
        .article-detail .detail-title { font-family: var(--font-calligraphy); font-size: clamp(1.6rem, 3vw, 2.4rem); color: var(--gold-bright); letter-spacing: 3px; text-shadow: 0 0 10px rgba(200,160,60,0.35); margin-bottom: 0.6rem; line-height: 1.3; }
        .article-detail .detail-meta { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; font-size: 0.85rem; color: var(--text-muted); }
        .article-detail .detail-tag { display: inline-block; background: rgba(180,150,100,0.1); border: 1px solid rgba(180,150,100,0.3); padding: 0.2rem 0.7rem; border-radius: 14px; font-size: 0.78rem; letter-spacing: 1px; color: var(--gold); }
        .article-detail .detail-content { font-family: var(--font-body); font-size: 1rem; line-height: 1.9; color: var(--text-primary); word-break: break-word; }
        .article-detail .detail-content h1,.article-detail .detail-content h2,.article-detail .detail-content h3 { font-family: var(--font-calligraphy); color: var(--gold-bright); margin-top: 1.5em; margin-bottom: 0.6em; letter-spacing: 1px; }
        .article-detail .detail-content h2 { border-left: 3px solid var(--gold); padding-left: 0.8rem; text-shadow: 0 0 8px rgba(200,160,60,0.25); }
        .article-detail .detail-content p { margin-bottom: 0.8em; text-indent: 1.5em; }
        .article-detail .detail-content code { font-family: var(--font-mono); background: rgba(0,229,255,0.08); padding: 0.15em 0.5em; border-radius: 4px; font-size: 0.9em; color: var(--cyan-neon); border: 1px solid rgba(0,229,255,0.2); }
        .article-detail .detail-content pre { background: rgba(0,0,0,0.5); border: 1px solid rgba(0,229,255,0.25); border-radius: var(--radius-md); padding: 1rem 1.2rem; overflow-x: auto; margin: 1em 0; box-shadow: 0 0 15px rgba(0,229,255,0.08); position: relative; }
        .article-detail .detail-content pre::before { content: '◈ 代码'; position: absolute; top: -10px; left: 12px; font-size: 0.7rem; color: var(--cyan-neon); background: var(--bg-deep); padding: 0 8px; letter-spacing: 1px; }
        .article-detail .detail-content pre code { background: transparent; border: none; padding: 0; color: #d4d4d4; font-size: 0.85rem; line-height: 1.6; }
        .article-detail .detail-content blockquote { border-left: 3px solid var(--gold); padding: 0.6rem 1rem; margin: 1em 0; background: rgba(180,150,100,0.05); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; color: var(--text-secondary); font-style: italic; letter-spacing: 0.5px; }
        .article-detail .detail-content img { max-width: 100%; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); margin: 1em 0; }
        .article-detail .detail-content hr { border: none; height: 1px; background: linear-gradient(90deg, transparent, rgba(180,150,100,0.4), transparent); margin: 1.5em 0; }
        .detail-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-subtle); }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 200; visibility: hidden; opacity: 0; transition: opacity 0.35s ease, visibility 0.35s; }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal { background: var(--bg-card); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); border-radius: var(--radius-lg); padding: 2rem; width: 92%; max-width: 520px; box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px var(--border-subtle), 0 0 30px var(--gold-glow); border: 1px solid rgba(180,150,100,0.4); position: relative; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h2 { font-family: var(--font-calligraphy); font-size: 1.8rem; color: var(--gold-bright); text-align: center; letter-spacing: 3px; margin-bottom: 1.5rem; text-shadow: 0 0 10px var(--gold-glow); }
        .modal .close-btn { position: absolute; top: 12px; right: 18px; background: none; border: none; font-size: 1.6rem; cursor: pointer; color: var(--text-muted); transition: color var(--transition-fast); z-index: 1; }
        .modal .close-btn:hover { color: var(--vermillion); }
        .input-group { margin-bottom: 1.1rem; }
        .input-group label { display: block; margin-bottom: 0.35rem; color: var(--text-secondary); font-size: 0.85rem; letter-spacing: 1px; }
        .input-group input, .input-group textarea { width: 100%; padding: 0.65rem 1rem; border: 1px solid rgba(180,150,100,0.35); border-radius: var(--radius-md); background: rgba(15,15,22,0.7); color: var(--text-primary); font-family: var(--font-body); font-size: 0.95rem; outline: none; transition: all var(--transition-smooth); letter-spacing: 0.5px; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--gold); box-shadow: 0 0 12px var(--gold-glow), 0 0 0 3px rgba(201,169,110,0.06); background: rgba(18,18,28,0.85); }
        .input-group textarea { min-height: 200px; resize: vertical; font-family: var(--font-body); line-height: 1.7; }
        .modal-actions { display: flex; justify-content: center; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .modal .hint { text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; }
        .admin-panel { background: var(--bg-card); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(197,59,59,0.3); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: 0 0 20px rgba(197,59,59,0.1), var(--shadow-card); animation: fadeInUp 0.5s ease; }
        .admin-panel h3 { font-family: var(--font-calligraphy); font-size: 1.5rem; color: #e8b0b0; letter-spacing: 2px; margin-bottom: 1rem; text-shadow: 0 0 10px var(--vermillion-glow); }
        .admin-panel .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.2rem; }
        .article-manage-item { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 0; border-bottom: 1px dashed rgba(180,150,100,0.2); flex-wrap: wrap; gap: 0.5rem; transition: background var(--transition-fast); }
        .article-manage-item:hover { background: rgba(255,255,255,0.02); }
        .article-manage-item .item-info { flex: 1; min-width: 150px; }
        .article-manage-item .item-title { color: var(--text-primary); font-weight: bold; letter-spacing: 1px; }
        .article-manage-item .item-date { font-size: 0.75rem; color: var(--text-muted); }
        .article-manage-item .item-actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .btn-danger { border-color: rgba(197,59,59,0.5) !important; color: #e8b0b0 !important; }
        .btn-danger:hover { background: rgba(197,59,59,0.2) !important; box-shadow: 0 0 15px var(--vermillion-glow) !important; border-color: var(--vermillion) !important; }
        .toast { position: fixed; top: 20px; right: 20px; z-index: 300; padding: 0.8rem 1.5rem; border-radius: var(--radius-md); font-family: var(--font-body); letter-spacing: 1px; font-size: 0.9rem; animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards; box-shadow: 0 8px 24px rgba(0,0,0,0.5); pointer-events: none; }
        .toast-success { background: rgba(30,50,30,0.9); border: 1px solid rgba(100,180,100,0.5); color: #b8e8b8; }
        .toast-error { background: rgba(50,20,20,0.9); border: 1px solid rgba(197,59,59,0.5); color: #e8b0b0; }
        @keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes toastOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        @media (max-width: 768px) {
            .plaque { padding: 0.5rem 1.2rem; }
            .plaque-title { font-size: clamp(1.5rem, 5vw, 2rem); letter-spacing: 3px; }
            .article-card { padding: 1rem 1.2rem; }
            .article-detail { padding: 1.2rem; }
            .article-detail .detail-content p { text-indent: 1em; }
            .modal { padding: 1.4rem; width: 95%; max-width: 95vw; }
            .articles-grid { grid-template-columns: 1fr; }
            .btn { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
        }
        .hidden { display: none !important; }
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <canvas id="particleCanvas"></canvas>
    <div id="toastContainer"></div>

    <div class="main-container">
        <header class="header">
            <div class="plaque-wrapper">
                <div class="plaque">
                    <span class="shine-line"></span>
                    <h1 class="plaque-title">墨韵·云笺</h1>
                </div>
            </div>
            <p class="subtitle">✦ 古风为骨 · 科技为翼 ✦</p>
            <div class="user-area" id="userArea">
                <span class="greeting" id="greetingText">未登录·过客</span>
                <button class="btn" id="loginBtn">🔑 登 录</button>
                <button class="btn admin-btn hidden" id="adminPanelBtn">⚙️ 管理</button>
                <button class="btn hidden" id="logoutBtn">🚪 登 出</button>
            </div>
        </header>

        <div class="view active" id="viewList">
            <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem;">
                <button class="btn primary-btn hidden" id="newArticleBtn">📝 撰写新篇</button>
            </div>
            <div class="articles-grid" id="articlesGrid"></div>
            <div class="empty-state hidden" id="emptyState">
                <span class="empty-icon">📜</span>
                尚无文章，静待墨香
            </div>
        </div>

        <div class="view" id="viewDetail">
            <button class="btn" id="backToListBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="article-detail" id="articleDetailContent"></div>
        </div>

        <div class="view" id="viewAdmin">
            <button class="btn" id="backFromAdminBtn" style="margin-bottom:1rem;">← 返回卷库</button>
            <div class="admin-panel" id="adminPanelContent">
                <div class="admin-header">
                    <h3>🔰 文章管理</h3>
                    <button class="btn primary-btn" id="adminNewArticleBtn">📝 撰写新篇</button>
                </div>
                <div id="adminArticlesList"></div>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="close-btn" id="closeLoginModal">&times;</button>
            <h2>🔑 登录云笺</h2>
            <form onsubmit="return false">
                <div class="input-group"><label>账号</label><input type="text" id="loginUsername" placeholder="请输入账号" autocomplete="username"></div>
                <div class="input-group"><label>密码</label><input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password"></div>
                <div class="modal-actions"><button class="btn primary-btn" id="submitLogin">登 录</button></div>
            </form>
            <p class="hint">游客可浏览，登录后方可管理文章</p>
        </div>
    </div>

    <!-- 文章编辑模态框 -->
    <div class="modal-overlay" id="articleModal">
        <div class="modal" style="max-width:640px;">
            <button class="close-btn" id="closeArticleModal">&times;</button>
            <h2 id="articleModalTitle">📝 撰写文章</h2>
            <form onsubmit="return false">
                <div class="input-group"><label>标题</label><input type="text" id="articleTitle" placeholder="文章标题"></div>
                <div class="input-group"><label>摘要</label><input type="text" id="articleSummary" placeholder="简短摘要（可选）"></div>
                <div class="input-group"><label>标签（逗号分隔）</label><input type="text" id="articleTags" placeholder="如：古风, 科技, 随笔"></div>
                <div class="input-group"><label>印章字符（1-2字）</label><input type="text" id="articleSeal" maxlength="2" placeholder="如：墨"></div>
                <div class="input-group"><label>内容（支持Markdown）</label><textarea id="articleContent" placeholder="在此书写文章内容...&#10;&#10;支持 Markdown 语法"></textarea></div>
                <input type="hidden" id="articleEditId">
                <div class="modal-actions">
                    <button class="btn primary-btn" id="submitArticle">发 布</button>
                    <button class="btn" id="cancelArticle">取 消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除确认模态框 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="max-width:400px;text-align:center;">
            <h2 style="color:#e8b0b0;">⚠️ 确认删除</h2>
            <p style="color:var(--text-secondary);margin-bottom:1.5rem;">此操作不可恢复，确定要删除这篇文章吗？</p>
            <div class="modal-actions">
                <button class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
                <button class="btn" id="cancelDeleteBtn">取 消</button>
            </div>
            <input type="hidden" id="confirmDeleteId">
        </div>
    </div>

    <script>
        (function() {
            var API_BASE = 'https://myzlm.serveousercontent.com';

            var $ = function(sel) { return document.querySelector(sel); };
            var $$ = function(sel) { return document.querySelectorAll(sel); };

            function escapeHtml(text) {
                var map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
                return String(text).replace(/[&<>"']/g, function(m) { return map[m]; });
            }

            function showToast(message, type) {
                type = type || 'success';
                var container = $('#toastContainer');
                var toast = document.createElement('div');
                toast.className = 'toast toast-' + type;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(function() {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 3000);
            }

            function formatDate(dateStr) {
                if (!dateStr) return '';
                var d = new Date(dateStr);
                var year = d.getFullYear();
                var month = d.getMonth() + 1;
                var day = d.getDate();
                var chineseMonths = ['', '元月', '杏月', '桃月', '槐月', '榴月', '荷月', '兰月', '桂月', '菊月', '露月', '葭月', '腊月'];
                var monthName = chineseMonths[month] || (month + '月');
                var gan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
                var zhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
                var gzYear = gan[(year - 4) % 10] + zhi[(year - 4) % 12];
                return gzYear + '年·' + monthName + day + '日';
            }

            var currentUser = null;
            var articles = [];
            var currentView = 'list';
            var pendingDeleteId = null;

            async function apiCall(url, options, silent) {
                options = options || {};
                silent = silent || false;
                var config = {
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' }
                };
                if (options.method) config.method = options.method;
                if (options.body && typeof options.body === 'object') {
                    config.body = JSON.stringify(options.body);
                }
                try {
                    var res = await fetch(API_BASE + url, config);
                    if (!res.ok) {
                        if (silent) return null;
                        var data = await res.json().catch(function() { return {}; });
                        throw new Error(data.error || '请求失败 (' + res.status + ')');
                    }
                    var text = await res.text();
                    if (!text) return null;
                    return JSON.parse(text);
                } catch (e) {
                    if (silent) return null;
                    throw e;
                }
            }

            async function checkLoginStatus() {
                var data = await apiCall('/api/me', {}, true);
                if (data && data.username) {
                    currentUser = data;
                } else {
                    currentUser = null;
                }
                updateUIByRole();
            }

            function updateUIByRole() {
                var greeting = $('#greetingText');
                var loginBtn = $('#loginBtn');
                var logoutBtn = $('#logoutBtn');
                var adminBtn = $('#adminPanelBtn');
                var newArticleBtn = $('#newArticleBtn');

                if (currentUser) {
                    var roleIcon = currentUser.role === 'admin' ? '🔰' : '📖';
                    greeting.textContent = roleIcon + ' ' + currentUser.username;
                    loginBtn.classList.add('hidden');
                    logoutBtn.classList.remove('hidden');
                    if (currentUser.role === 'admin') {
                        adminBtn.classList.remove('hidden');
                        newArticleBtn.classList.remove('hidden');
                    } else {
                        adminBtn.classList.add('hidden');
                        newArticleBtn.classList.add('hidden');
                    }
                } else {
                    greeting.textContent = '未登录·过客';
                    loginBtn.classList.remove('hidden');
                    logoutBtn.classList.add('hidden');
                    adminBtn.classList.add('hidden');
                    newArticleBtn.classList.add('hidden');
                }
                if (currentView === 'list') renderArticleList();
                if (currentView === 'admin') renderAdminPanel();
            }

            async function login(username, password) {
                var data = await apiCall('/api/login', { method: 'POST', body: { username: username, password: password } });
                currentUser = { username: data.username, role: data.role };
                updateUIByRole();
                showToast('欢迎回来，' + data.username, 'success');
                return data;
            }

            async function logout() {
                await apiCall('/api/logout', { method: 'POST' }, true);
                currentUser = null;
                updateUIByRole();
                showToast('已登出', 'success');
                switchView('list');
            }

            function switchView(view) {
                currentView = view;
                var views = $$('.view');
                for (var i = 0; i < views.length; i++) {
                    views[i].classList.remove('active');
                }
                var targetView = $('#view' + view.charAt(0).toUpperCase() + view.slice(1));
                if (targetView) targetView.classList.add('active');
                if (view === 'list') renderArticleList();
                if (view === 'admin') renderAdminPanel();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            async function loadArticles() {
                try {
                    var data = await apiCall('/api/articles');
                    articles = Array.isArray(data) ? data : [];
                } catch (e) {
                    articles = [];
                }
            }

            function renderArticleList() {
                var grid = $('#articlesGrid');
                var emptyState = $('#emptyState');
                if (!articles || articles.length === 0) {
                    grid.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }
                emptyState.classList.add('hidden');
                var html = '';
                for (var i = 0; i < articles.length; i++) {
                    var article = articles[i];
                    html += '<div class="article-card" data-id="' + escapeHtml(article.id) + '">';
                    html += '<div class="card-header">';
                    html += '<span class="card-title">' + escapeHtml(article.title || '无题') + '</span>';
                    html += '<span class="card-seal">' + escapeHtml(article.seal || '墨') + '</span>';
                    html += '</div>';
                    html += '<p class="card-summary">' + escapeHtml(article.summary || (article.content ? article.content.substring(0, 120) : '暂无摘要')) + '</p>';
                    html += '<div class="card-meta">';
                    html += '<span class="card-date">' + formatDate(article.createdAt) + '</span>';
                    var tags = article.tags || [];
                    for (var j = 0; j < tags.length; j++) {
                        html += '<span class="card-tag">' + escapeHtml(tags[j]) + '</span>';
                    }
                    html += '</div></div>';
                }
                grid.innerHTML = html;

                // 使用事件委托处理文章点击
                grid.onclick = function(e) {
                    var card = e.target.closest('.article-card');
                    if (card) {
                        var id = card.dataset.id;
                        if (id) viewArticle(id);
                    }
                };
            }

            async function viewArticle(id) {
                try {
                    var article = await apiCall('/api/articles/' + encodeURIComponent(id));
                    if (!article) {
                        showToast('文章不存在', 'error');
                        return;
                    }
                    renderArticleDetail(article);
                    switchView('detail');
                    $('#articleDetailContent').dataset.loaded = 'true';
                    $('#articleDetailContent').dataset.articleId = id;
                } catch (e) {
                    showToast('加载文章失败: ' + e.message, 'error');
                }
            }

            function renderArticleDetail(article) {
                var container = $('#articleDetailContent');
                var contentHtml = '';
                try {
                    if (typeof marked !== 'undefined' && article.content) {
                        contentHtml = marked.parse(article.content);
                    } else {
                        contentHtml = escapeHtml(article.content || '').replace(/\n/g, '<br>');
                    }
                } catch (e) {
                    contentHtml = escapeHtml(article.content || '').replace(/\n/g, '<br>');
                }

                var html = '<div class="detail-header">';
                html += '<h1 class="detail-title">' + escapeHtml(article.title || '无题') + '</h1>';
                html += '<div class="detail-meta">';
                html += '<span>📅 ' + formatDate(article.createdAt) + '</span>';
                if (article.updatedAt && article.updatedAt !== article.createdAt) {
                    html += '<span>✏️ 更新于 ' + formatDate(article.updatedAt) + '</span>';
                }
                var tags = article.tags || [];
                for (var i = 0; i < tags.length; i++) {
                    html += '<span class="detail-tag">' + escapeHtml(tags[i]) + '</span>';
                }
                html += '<span style="margin-left:auto;color:var(--vermillion);font-family:var(--font-calligraphy);font-size:1.2rem;">【' + escapeHtml(article.seal || '墨') + '】</span>';
                html += '</div></div>';
                html += '<div class="detail-content">' + contentHtml + '</div>';
                html += '<div class="detail-actions"></div>';
                container.innerHTML = html;

                // 动态绑定编辑/删除按钮
                var actionsDiv = container.querySelector('.detail-actions');
                if (currentUser && currentUser.role === 'admin') {
                    var editBtn = document.createElement('button');
                    editBtn.className = 'btn btn-sm';
                    editBtn.textContent = '✏️ 编辑';
                    editBtn.onclick = function() { openArticleEditor(article.id); };
                    actionsDiv.appendChild(editBtn);

                    var delBtn = document.createElement('button');
                    delBtn.className = 'btn btn-sm btn-danger';
                    delBtn.textContent = '🗑️ 删除';
                    delBtn.onclick = function() { confirmDeleteArticle(article.id, article.title); };
                    actionsDiv.appendChild(delBtn);
                }

                container.dataset.loaded = 'true';
                container.dataset.articleId = article.id;
            }

            async function openArticleEditor(articleId) {
                var modal = $('#articleModal');
                var titleEl = $('#articleModalTitle');
                var submitBtn = $('#submitArticle');
                if (articleId) {
                    try {
                        var article = await apiCall('/api/articles/' + encodeURIComponent(articleId));
                        if (!article) {
                            showToast('文章不存在', 'error');
                            return;
                        }
                        titleEl.textContent = '✏️ 编辑文章';
                        submitBtn.textContent = '保 存';
                        $('#articleTitle').value = article.title || '';
                        $('#articleSummary').value = article.summary || '';
                        $('#articleTags').value = (article.tags || []).join(', ');
                        $('#articleSeal').value = article.seal || '墨';
                        $('#articleContent').value = article.content || '';
                        $('#articleEditId').value = articleId;
                    } catch (e) {
                        showToast('加载文章失败: ' + e.message, 'error');
                        return;
                    }
                } else {
                    titleEl.textContent = '📝 撰写新篇';
                    submitBtn.textContent = '发 布';
                    $('#articleTitle').value = '';
                    $('#articleSummary').value = '';
                    $('#articleTags').value = '';
                    $('#articleSeal').value = '墨';
                    $('#articleContent').value = '';
                    $('#articleEditId').value = '';
                }
                modal.classList.add('active');
            }

            async function submitArticle() {
                var title = $('#articleTitle').value.trim();
                var content = $('#articleContent').value.trim();
                if (!title || !content) {
                    showToast('标题和内容不能为空', 'error');
                    return;
                }
                var articleData = {
                    title: title,
                    content: content,
                    summary: $('#articleSummary').value.trim(),
                    tags: $('#articleTags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean),
                    seal: $('#articleSeal').value.trim() || '墨'
                };
                var editId = $('#articleEditId').value;
                try {
                    if (editId) {
                        await apiCall('/api/articles/' + encodeURIComponent(editId), { method: 'PUT', body: articleData });
                        showToast('文章已更新', 'success');
                    } else {
                        await apiCall('/api/articles', { method: 'POST', body: articleData });
                        showToast('文章已发布', 'success');
                    }
                    $('#articleModal').classList.remove('active');
                    await loadArticles();
                    if (currentView === 'list') renderArticleList();
                    if (currentView === 'admin') renderAdminPanel();
                    var detailContainer = $('#articleDetailContent');
                    if (detailContainer.dataset.loaded === 'true' && detailContainer.dataset.articleId === editId) {
                        await viewArticle(editId);
                    }
                } catch (e) {
                    showToast('操作失败: ' + e.message, 'error');
                }
            }

            function confirmDeleteArticle(id, title) {
                pendingDeleteId = id;
                $('#confirmModal').classList.add('active');
                $('#confirmModal').querySelector('p').textContent = '此操作不可恢复，确定要删除「' + (title || '这篇文章') + '」吗？';
            }

            async function executeDelete() {
                if (!pendingDeleteId) return;
                try {
                    await apiCall('/api/articles/' + encodeURIComponent(pendingDeleteId), { method: 'DELETE' });
                    showToast('文章已删除', 'success');
                    $('#confirmModal').classList.remove('active');
                    pendingDeleteId = null;
                    await loadArticles();
                    if (currentView === 'list') renderArticleList();
                    if (currentView === 'admin') renderAdminPanel();
                    if (currentView === 'detail') switchView('list');
                } catch (e) {
                    showToast('删除失败: ' + e.message, 'error');
                    $('#confirmModal').classList.remove('active');
                    pendingDeleteId = null;
                }
            }

            async function renderAdminPanel() {
                var container = $('#adminArticlesList');
                if (!articles || articles.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">暂无文章，点击上方按钮撰写第一篇</p>';
                    return;
                }
                var html = '';
                for (var i = 0; i < articles.length; i++) {
                    var a = articles[i];
                    html += '<div class="article-manage-item">';
                    html += '<div class="item-info">';
                    html += '<span class="item-title">' + escapeHtml(a.title || '无题') + '</span>';
                    html += '<span class="item-date">' + formatDate(a.createdAt) + '</span>';
                    html += '</div>';
                    html += '<div class="item-actions">';
                    html += '<button class="btn btn-sm edit-btn" data-id="' + escapeHtml(a.id) + '">✏️</button>';
                    html += '<button class="btn btn-sm btn-danger delete-btn" data-id="' + escapeHtml(a.id) + '" data-title="' + escapeHtml(a.title || '') + '">🗑️</button>';
                    html += '</div></div>';
                }
                container.innerHTML = html;

                // 事件委托
                container.onclick = function(e) {
                    var target = e.target;
                    if (target.classList.contains('edit-btn')) {
                        openArticleEditor(target.dataset.id);
                    } else if (target.classList.contains('delete-btn')) {
                        confirmDeleteArticle(target.dataset.id, target.dataset.title);
                    }
                };
            }

            function initParticles() {
                var canvas = $('#particleCanvas');
                var ctx = canvas.getContext('2d');
                var w, h;
                var particles = [];
                function resize() {
                    w = window.innerWidth;
                    h = window.innerHeight;
                    canvas.width = w;
                    canvas.height = h;
                }
                window.addEventListener('resize', resize);
                resize();

                function Particle() {
                    this.reset(true);
                }
                Particle.prototype.reset = function(init) {
                    this.x = Math.random() * w;
                    this.y = init ? Math.random() * h : -10;
                    this.size = 0.8 + Math.random() * 2;
                    this.speed = 0.3 + Math.random() * 1;
                    this.opacity = 0.3 + Math.random() * 0.5;
                    this.isGold = Math.random() > 0.5;
                    this.color = this.isGold ? 'rgba(200,165,100,' + this.opacity + ')' : 'rgba(0,220,240,' + this.opacity + ')';
                };
                Particle.prototype.update = function() {
                    this.y += this.speed;
                    if (this.y > h + 10) this.reset(false);
                };
                Particle.prototype.draw = function(ctx) {
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                };

                for (var i = 0; i < 50; i++) {
                    particles.push(new Particle());
                }
                function animate() {
                    ctx.clearRect(0, 0, w, h);
                    for (var i = 0; i < particles.length; i++) {
                        particles[i].update();
                        particles[i].draw(ctx);
                    }
                    requestAnimationFrame(animate);
                }
                animate();
            }

            function bindEvents() {
                $('#loginBtn').addEventListener('click', function() {
                    $('#loginModal').classList.add('active');
                });
                $('#closeLoginModal').addEventListener('click', function() {
                    $('#loginModal').classList.remove('active');
                });
                $('#submitLogin').addEventListener('click', async function() {
                    var u = $('#loginUsername').value.trim();
                    var p = $('#loginPassword').value;
                    if (!u || !p) {
                        showToast('请输入账号和密码', 'error');
                        return;
                    }
                    try {
                        await login(u, p);
                        $('#loginModal').classList.remove('active');
                        $('#loginUsername').value = '';
                        $('#loginPassword').value = '';
                        await loadArticles();
                        renderArticleList();
                    } catch (err) {
                        showToast('登录失败: ' + err.message, 'error');
                    }
                });
                $('#logoutBtn').addEventListener('click', logout);
                $('#adminPanelBtn').addEventListener('click', function() {
                    switchView('admin');
                });
                $('#backFromAdminBtn').addEventListener('click', function() {
                    switchView('list');
                });
                $('#newArticleBtn').addEventListener('click', function() {
                    openArticleEditor(null);
                });
                $('#adminNewArticleBtn').addEventListener('click', function() {
                    openArticleEditor(null);
                });
                $('#closeArticleModal').addEventListener('click', function() {
                    $('#articleModal').classList.remove('active');
                });
                $('#cancelArticle').addEventListener('click', function() {
                    $('#articleModal').classList.remove('active');
                });
                $('#submitArticle').addEventListener('click', submitArticle);
                $('#backToListBtn').addEventListener('click', function() {
                    switchView('list');
                });
                $('#confirmDeleteBtn').addEventListener('click', executeDelete);
                $('#cancelDeleteBtn').addEventListener('click', function() {
                    $('#confirmModal').classList.remove('active');
                    pendingDeleteId = null;
                });

                var overlays = $$('.modal-overlay');
                for (var i = 0; i < overlays.length; i++) {
                    (function(ov) {
                        ov.addEventListener('click', function(e) {
                            if (e.target === ov) ov.classList.remove('active');
                        });
                    })(overlays[i]);
                }

                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape') {
                        var activeModals = $$('.modal-overlay.active');
                        for (var i = 0; i < activeModals.length; i++) {
                            activeModals[i].classList.remove('active');
                        }
                        pendingDeleteId = null;
                    }
                });
                $('#loginPassword').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') $('#submitLogin').click();
                });
            }

            window._blogApp = {
                viewArticle: viewArticle,
                editArticle: openArticleEditor,
                confirmDeleteArticle: confirmDeleteArticle,
                switchView: switchView
            };

            async function init() {
                initParticles();
                bindEvents();
                await loadArticles();
                await checkLoginStatus();
                renderArticleList();
                console.log('🖌️  墨韵·云笺 博客已就绪 | API: ' + API_BASE);
                console.log('👤 默认账号: zlm / zlm20130503');
            }

            init();
        })();
    </script>
